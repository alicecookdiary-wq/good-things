<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾莉絲的食光日記｜好物導航</title>
    <style>
        /* 頂級日系極簡與當代科技微光視覺 */
        :root {
            --bg-color: #FAF8F5;       /* 純淨奶油白 */
            --grid-color: rgba(223, 213, 201, 0.25); /* 浮空網格線條 */
            --card-bg: rgba(255, 255, 255, 0.85);    /* 霧面微透白 */
            --text-main: #4A443F;      /* 沉穩焙茶色 */
            --text-sub: #A39990;       /* 質樸木質灰 */
            --border-color: #EFEAE4;   /* 極細線條 */
            --accent-glow: #C5B4A5;    /* 燕麥微光 */
            --btn-active: #8E7F73;     /* 摩卡深色 */
            --baby-pink-bg: #FFF0EE;   /* 母嬰粉底色 */
            --baby-pink-border: #FCDAD5; /* 母嬰粉邊線 */
            --baby-pink-text: #C57B75;   /* 母嬰粉字體 */
            --baby-pink-active: #E29B96; /* 母嬰粉選中 */
            --shadow-sm: 0 4px 20px rgba(74, 68, 63, 0.02);
            --shadow-md: 0 8px 30px rgba(197, 180, 165, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                radial-gradient(circle at 10% 20%, rgba(242, 236, 230, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 197, 185, 0.3) 0%, transparent 50%);
            background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 0.6px;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px 100px; /* 底部預留空間防止懸浮選單遮擋 */
            animation: fadeInPage 0.6s ease-out;
            position: relative;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 頂部高級感磨砂玻璃標頭 --- */
        .hero-header {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }
        .hero-header h1 {
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .hero-header p {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- STREAMING_CHUNK: Styling the Omikuji block and animations... --- */
        /* --- 每日抽籤專屬日本神社與手帳美學動態樣式 --- */
        @keyframes shakeOmikuji {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            15% { transform: translateY(-8px) rotate(-12deg); }
            30% { transform: translateY(-3px) rotate(10deg); }
            45% { transform: translateY(-8px) rotate(-10deg); }
            60% { transform: translateY(-3px) rotate(8deg); }
            75% { transform: translateY(-6px) rotate(-6deg); }
            90% { transform: translateY(-2px) rotate(4deg); }
        }
        @keyframes stickOut {
            0% { transform: translateY(0); }
            100% { transform: translateY(-16px); }
        }
        @keyframes slideUpSlip {
            from { opacity: 0; transform: translateY(22px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .shaking-box {
            animation: shakeOmikuji 0.8s ease-in-out;
        }
        .stick-popping {
            animation: stickOut 0.8s forwards ease-out;
        }
        .slide-up-slip-anim {
            animation: slideUpSlip 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- 專屬日系手帳感：今日御神籤重新抽籤按鈕 --- */
        .omikuji-reset-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .omikuji-reset-btn:hover {
            border-color: var(--accent-glow);
            color: var(--text-main);
            background-color: rgba(239, 234, 228, 0.25);
        }
        .omikuji-reset-btn:active {
            transform: scale(0.96);
        }

        /* --- 區塊外殼 --- */
        .page-section {
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 24px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            scroll-margin-top: 24px; /* 防止錨點滾動時被邊緣切到 */
        }
        
        .page-section:focus-within, .page-section:hover {
            border-color: var(--accent-glow);
            box-shadow: var(--shadow-md);
        }

        .section-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulseGlow 2s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px var(--accent-glow); }
        }

        .section-title-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }

        /* --- STREAMING_CHUNK: Styling the SVG banner and illustration... --- */
        /* --- 代碼自動繪製：日系生活感極簡主圖橫幅 --- */
        .hero-banner-illustration {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: linear-gradient(135deg, #F3ECE5 0%, #EAE2D8 100%);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .banner-window {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .banner-shadow-leaves {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(163, 153, 144, 0.08) 0%, transparent 60%);
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .banner-shelf {
            position: absolute;
            width: 100%;
            height: 35px;
            background: #E5DBD0;
            bottom: 0;
            left: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -4px 10px rgba(74, 68, 63, 0.02);
        }
        .banner-bottles-group {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }
        .b-bottle-1 {
            width: 24px;
            height: 65px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 6px 6px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: -2px 4px 10px rgba(74, 68, 63, 0.05);
        }
        .b-bottle-1::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 10px;
            background: #EAE2D8;
            top: -10px;
            left: 5px;
            border-radius: 3px 1px 1px 1px;
        }
        .b-bottle-1::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 50px;
            background: rgba(142, 127, 115, 0.2);
            left: 11px;
            top: 5px;
        }
        .b-bottle-2 {
            width: 32px;
            height: 75px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px 8px 6px 6px;
            position: relative;
            backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 12px rgba(74, 68, 63, 0.06);
        }
        .b-bottle-2::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 8px;
            background: #FFFFFF;
            top: -8px;
            left: 11px;
        }
        .b-bottle-2::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 6px;
            background: #DCD2C7;
            top: -14px;
            left: 7px;
            border-radius: 2px 4px 2px 2px;
        }
        .b-bottle-3 {
            width: 28px;
            height: 52px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 5px 5px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 2px 4px 10px rgba(74, 68, 63, 0.04);
        }
        .b-bottle-3::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 6px;
            background: #C5B4A5;
            top: -6px;
            left: 4px;
            border-radius: 2px 2px 1px 1px;
        }

        /* --- 微縮版開團計畫行事曆專屬手繪美學樣式 --- */
        .calendar-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .calendar-title-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #D3C5B5; /* 溫暖木質沙褐色 */
        }
        .calendar-title-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }
        .calendar-title-line {
            border: none;
            border-top: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .calendar-section-outer {
            margin-bottom: 16px;
        }
        .calendar-months-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
        }
        .calendar-nav-tab {
            flex: 1;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-sub);
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .calendar-nav-tab.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            box-shadow: 0 4px 12px rgba(142, 127, 115, 0.15);
        }
        .calendar-paper {
            background-color: transparent;
            border: none;
            padding: 0;
            box-shadow: none;
        }
        .calendar-header-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
        }
        .calendar-day-label {
            font-size: 0.78rem;
            color: var(--text-sub);
            font-weight: 500;
        }
        .calendar-days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 4px;
            column-gap: 6px;
            text-align: center;
            margin-bottom: 12px;
        }
        .calendar-cell {
            aspect-ratio: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-main);
            position: relative;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .calendar-cell.muted {
            color: #D1C9C0;
        }
        .calendar-cell.hl-neoflam { background-color: #E5DBD0 !important; color: #4A443F !important; font-weight: 600; }
        .calendar-cell.hl-sanko { background-color: #D8E2DC !important; color: #2D4F38 !important; font-weight: 600; }
        .calendar-cell.hl-spacebox { background-color: #FFF0EE !important; color: #C57B75 !important; font-weight: 600; }
        .calendar-cell.hl-yansantiao { background-color: #DCE1E5 !important; color: #2F435A !important; font-weight: 600; }
        .calendar-cell.hl-oxo { background-color: #F5E5D9 !important; color: #834E2B !important; font-weight: 600; }
        .calendar-cell.hl-bonson { background-color: #EAE5F5 !important; color: #5E3D85 !important; font-weight: 600; }

        .calendar-divider-dashed {
            border: none;
            border-top: 1px dashed #E2DBD5;
            margin: 20px 0;
        }
        .calendar-event-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 4px;
        }
        .calendar-event-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .calendar-event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .calendar-event-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .calendar-event-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .calendar-event-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .calendar-event-date {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 500;
        }
        .calendar-event-desc {
            font-size: 0.78rem;
            color: var(--text-sub);
            line-height: 1.45;
        }

        /* --- 橫向流暢滑動複選濾鏡 --- */
        .filter-box {
            background: rgba(250, 248, 245, 0.7);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 2px;
        }
        .filter-buttons::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(142, 127, 115, 0.15);
        }

        /* --- 專屬莫蘭迪母嬰粉色按鈕樣式 --- */
        .filter-btn.baby-pink-btn {
            background-color: var(--baby-pink-bg);
            border-color: var(--baby-pink-border);
            color: var(--baby-pink-text);
        }
        .filter-btn.baby-pink-btn.active {
            background-color: var(--baby-pink-active) !important;
            border-color: var(--baby-pink-active) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 10px rgba(226, 155, 150, 0.25) !important;
        }

        /* --- 頂級流暢卡片流 --- */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .item-card {
            background-color: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInItem 0.4s ease-out forwards;
        }
        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item-card:active {
            transform: scale(0.97);
            background-color: rgba(239, 234, 228, 0.7);
            border-color: var(--accent-glow);
        }
        .item-card.hidden { display: none; }
        
        .item-img-container {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background-color: #EFEAE4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .item-img-container svg {
            width: 38px;
            height: 38px;
            display: block;
        }
        .item-info { flex: 1; }
        .item-name-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .item-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        
        .origin-badge {
            font-size: 0.625rem;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }
        .origin-tw { background-color: #EBF8F2; color: #1B7A54; border-color: #D3F1E3; }
        .origin-jp { background-color: #FDF2F2; color: #C82F2F; border-color: #FBE2E2; }
        .origin-fr { background-color: #F0F4FF; color: #2B5797; border-color: #E1E8FA; }

        .item-desc { font-size: 0.75rem; color: var(--text-sub); line-height: 1.45; }
        .item-arrow { 
            color: var(--text-sub); 
            font-size: 0.85rem; 
            margin-left: 8px; 
            transition: transform 0.3s ease;
        }
        .item-card:hover .item-arrow {
            transform: translateX(3px);
            color: var(--btn-active);
        }
        
        .status-tag-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .status-tag { 
            font-size: 0.62rem; 
            background-color: #EFEAE4; 
            color: var(--btn-active); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .text-legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .date-tag {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-left: auto;
            font-weight: 500;
        }
        .no-results { text-align: center; padding: 20px 20px; color: var(--text-sub); font-size: 0.8rem; line-height: 1.6; }

        #calendar-schedule-details .item-card {
            padding: 10px 14px;
            gap: 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: rgba(250, 248, 245, 0.4);
        }
        #calendar-schedule-details .item-name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        #calendar-schedule-details .item-desc {
            font-size: 0.68rem;
            line-height: 1.35;
            color: var(--text-sub);
            margin-top: 2px;
        }
        #calendar-schedule-details .date-tag {
            font-size: 0.68rem;
        }

        /* --- STREAMING_CHUNK: Styling the newly designed floating navigation dock... --- */
        /* --- 懸浮美學折導航專屬樣式 --- */
        .floating-nav-container {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            pointer-events: none; /* 穿透未展開區域以免阻擋點擊 */
        }
        @media (min-width: 480px) {
            .floating-nav-container {
                right: calc(50% - 240px + 20px); /* 桌機版自動對齊極簡480px寬度容器邊界 */
            }
        }

        /* 背景微光遮罩，展開時增添極簡高級感 */
        .float-backdrop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74, 68, 63, 0.04);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            z-index: 998;
            transition: all 0.4s ease;
            pointer-events: auto;
        }
        .float-backdrop-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .float-menu-list {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 12px;
            pointer-events: auto;
        }

        /* 子導航按鈕項目 */
        .float-item {
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(15px) scale(0.85);

            pointer-events: none;
        }
        /* 展開後的顯示狀態與階梯式延遲動畫 */
        .float-item.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .float-item:nth-last-child(1) { transition-delay: 0.04s; }
        .float-item:nth-last-child(2) { transition-delay: 0.08s; }
        .float-item:nth-last-child(3) { transition-delay: 0.12s; }
        .float-item:nth-last-child(4) { transition-delay: 0.16s; }
        .float-item:nth-last-child(5) { transition-delay: 0.20s; }

        /* 細緻的標籤文字提示 */

            background: rgba(255, 255, 255, 0.9);

            -webkit-backdrop-filter: blur(6px);
            border: 1px solid var(--border-color);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.72rem;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
            letter-spacing: 0.8px;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }
        /* 展開且滑過時，或觸碰時展開標籤 */
        .float-item.show .float-label {
            opacity: 0.95;
            transform: translateX(0);
        }

        /* 單個圓形小按鈕 */
        .float-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

        .float-btn:hover {

            background-color: #FFFFFF;
            transform: scale(1.08);
            box-shadow: 0 4px 15px rgba(197, 180, 165, 0.25);
        }
        .float-btn:active {
            transform: scale(0.95);
        }
        .float-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-main);
            transition: stroke 0.3s ease;
        }
        .float-btn:hover svg {
            stroke: var(--btn-active);
        }

        /* 主控觸發大按鈕 */
        .float-trigger-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--btn-active);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;

        .float-trigger-btn:hover {

</head>

<script>
    // --- STREAMING_CHUNK: Initializing calendar and event database... ---
    // --- 曆檔與行事曆連動系統 ---
    const scheduleData = {
        7: {
            daysInMonth: 31,
            startDayOffset: 3, 
            events: [
                { start: 12, end: 19, key: 'neoflam' },
                { start: 20, end: 26, key: 'sanko' },
                { start: 28, end: 31, key: 'spacebox' }
            ]
        },
        8: {
            daysInMonth: 31,
            startDayOffset: 6, 
            events: [
                { start: 1, end: 10, key: 'spacebox' },
                { start: 10, end: 16, key: 'yansantiao' },
                { start: 26, end: 31, key: 'oxo' }
            ]
        },
        9: {
            daysInMonth: 30,
            startDayOffset: 2, 
            events: [
                { start: 10, end: 16, key: 'bonson' }
            ]
        }
    };

    // 專屬多色膠帶與品牌色連動定義
    const eventColors = {
        neoflam: { bg: '#E5DBD0', text: '#4A443F', class: 'hl-neoflam', label: '韓國 Neoflam 鍋具', turn: '首團', date: '7/12 - 7/19', desc: '「專利陶瓷塗層，安全無毒、極致不沾且美型。」' },
        sanko: { bg: '#D8E2DC', text: '#2D4F38', class: 'hl-sanko', label: '日本 Sanko 地墊', turn: '首團', date: '7/20 - 7/26', desc: '「專利吸附防滑，可洗可剪，耐踩吸水不位移。」' },
        spacebox: { bg: '#FFF0EE', text: '#C57B75', class: 'hl-spacebox', label: 'Space Box 折疊矽膠太空盒', turn: '二團', date: '7/28 - 8/10', desc: '「秒縮折疊好攜帶，高防漏防燙、白金矽膠製。」' },
        yansantiao: { bg: '#DCE1E5', text: '#2F435A', class: 'hl-yansantiao', label: '日本 燕三条 廚具', turn: '二團', date: '8/10 - 8/16', desc: '「極致職人工藝，高規耐磨、不易生鏽超鋒利。」' },
        oxo: { bg: '#F5E5D9', text: '#834E2B', class: 'hl-oxo', label: '美國 OXO 廚房好物', turn: '首團', date: '8/26 - 8/31', desc: '「人體工學防滑餐廚小物，極致省力好上手。」' },
        bonson: { bg: '#EAE5F5', text: '#5E3D85', class: 'hl-bonson', label: 'Bonson 智慧垃圾桶', turn: '首團', date: '9/10 - 9/16', desc: '「一鍵自動密閉打包鋪袋，0.2秒感應免髒手。」' }
    };

    // 控制月份在下方條列名單中出現的檔期
    const monthEventLists = {
        7: ['neoflam', 'sanko', 'spacebox'],
        8: ['spacebox', 'yansantiao', 'oxo'],
        9: ['bonson']
    };

    let activeMonth = 7;

    function renderCalendar() {
        const daysContainer = document.getElementById('calendar-days-container');
        const detailsContainer = document.getElementById('calendar-schedule-details');
        if (!daysContainer || !detailsContainer) return;

        daysContainer.innerHTML = '';
        detailsContainer.innerHTML = '';

        const mData = scheduleData[activeMonth];
        
        // 1. 渲染前一個月的淡色格子
        const prevMonthMutedDays = {
            7: [28, 29, 30],
            8: [26, 27, 28, 29, 30, 31],
            9: [30, 31]
        };
        const prevMuted = prevMonthMutedDays[activeMonth] || [];
        prevMuted.forEach(dNum => {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell muted';
            cell.innerHTML = `<span>${dNum}</span>`;
            daysContainer.appendChild(cell);
        });

        // 2. 渲染當月的所有日期格與高亮區塊
        for (let day = 1; day <= mData.daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerHTML = `<span>${day}</span>`;

            let keyMatch = null;
            mData.events.forEach(ev => {
                if (day >= ev.start && day <= ev.end) {
                    keyMatch = ev.key;
                }
            });

            if (keyMatch) {
                const colorInfo = eventColors[keyMatch];
                cell.classList.add(colorInfo.class);
            }

            daysContainer.appendChild(cell);
        }

        // 3. 補齊下一個月開始的淡色格子
        const totalCells = prevMuted.length + mData.daysInMonth;
        const remainder = totalCells % 7;
        if (remainder !== 0) {
            const nextMutedCount = 7 - remainder;
            for (let day = 1; day <= nextMutedCount; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell muted';
                cell.innerHTML = `<span>${day}</span>`;
                daysContainer.appendChild(cell);
            }
        }

        // 4. 渲染下方明細清單
        const activeList = monthEventLists[activeMonth] || [];
        activeList.forEach(key => {
            const info = eventColors[key];
            const eventItem = document.createElement('div');
            eventItem.className = 'calendar-event-item';
            
            eventItem.innerHTML = `
                <div class="calendar-event-dot" style="background-color: ${info.bg}; border: 1px solid rgba(74, 68, 63, 0.05);"></div>
                <div class="calendar-event-content">
                    <div class="calendar-event-title-row">
                        <span class="calendar-event-title">${info.label}</span>

                </div>
            `;
            detailsContainer.appendChild(eventItem);
        });
    }

    function switchCalendarMonth(m) {
        activeMonth = m;
        document.querySelectorAll('.calendar-nav-tab').forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText.includes(m)) {
                btn.classList.add('active');
            }
        });
        renderCalendar();
    }

    const filterButtons = document.querySelectorAll('.filter-btn');
    const itemsContainer = document.getElementById('navigation-items');
    const noResultsMsg = document.getElementById('no-results-msg');

    // --- STREAMING_CHUNK: Setting up product filtering interactions... ---
    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const isBabyBtn = btn.classList.contains('baby-pink-btn');
            if (isBabyBtn) {
                document.querySelectorAll('.filter-btn:not(.baby-pink-btn)').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.baby-pink-btn').forEach(b => { if (b !== btn) b.classList.remove('active'); });
            } else {
                document.querySelectorAll('.filter-btn.baby-pink-btn').forEach(b => b.classList.remove('active'));
            }
            btn.classList.toggle('active');
            filterItems();
        });
    });

    function filterItems() {
        const activeSpace = Array.from(document.querySelectorAll('.filter-group:nth-child(1) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activePurpose = Array.from(document.querySelectorAll('.filter-group:nth-child(2) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeMaterial = Array.from(document.querySelectorAll('.filter-group:nth-child(3) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeBaby = Array.from(document.querySelectorAll('.baby-pink-btn.active')).map(btn => btn.getAttribute('data-filter'));

        if (!itemsContainer || !noResultsMsg) return;

        if (activeBaby.length > 0) {
            const filteredBaby = allProductsData.filter(prod => {
                if (!prod.isBaby) return false;
                const prodTags = prod.tags.split(' ');
                return activeBaby.some(filter => prodTags.includes(filter));
            });
            renderList(filteredBaby);
            return;
        }

        if (activeSpace.length === 0 || activePurpose.length === 0 || activeMaterial.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "請同時點選「空間」、「用途」與「材質」大類，解鎖私房愛用好物 🤎";
            noResultsMsg.style.display = 'block';
            return;
        }

        const filteredGeneral = allProductsData.filter(prod => {
            if (prod.isBaby) return false;
            const prodTags = prod.tags.split(' ');
            const matchesSpace = activeSpace.some(f => prodTags.includes(f));
            const matchesPurpose = activePurpose.some(f => prodTags.includes(f));
            const matchesMaterial = activeMaterial.some(f => prodTags.includes(f));
            return matchesSpace && matchesPurpose && matchesMaterial;
        });
        renderList(filteredGeneral);
    }

    function renderList(list) {
        if (!itemsContainer || !noResultsMsg) return;

        if (list.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "未找到符合交叉條件的物件";
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
            itemsContainer.innerHTML = '';

            list.forEach(prod => {
                const card = document.createElement('a');
                card.href = prod.url;
                card.target = "_blank";
                card.className = "item-card";

                const badgeHTML = (prod.isBaby && prod.origin) 
                    ? `<span class="origin-badge ${getBadgeClass(prod.origin)}">${prod.origin}</span>` 
                    : '';

                const itemImgHTML = `<div class="item-img-container">${prod.svg}</div>`;

                card.innerHTML = `
                    ${itemImgHTML}
                    <div class="item-info">
                        <div class="item-name-row">
                            <span class="item-name">${prod.name}</span>
                            ${badgeHTML}
                        </div>
                        <div class="item-desc">${prod.desc}</div>
                    </div>
                    <div class="item-arrow">→</div>
                `;
                itemsContainer.appendChild(card);
            });
        }
    }

    function getBadgeClass(origin) {
        if (origin.includes("台灣")) return "origin-tw";
        if (origin.includes("日本")) return "origin-jp";
        if (origin.includes("法國")) return "origin-fr";
        return "";

    function drawOmikuji() {
        const box = document.getElementById('omikuji-box');
        const stick = document.getElementById('omikuji-stick');
        const drawZone = document.getElementById('omikuji-draw-zone');
        const resultZone = document.getElementById('omikuji-result-zone');
        if (!box || !stick || !drawZone || !resultZone) return;

        box.classList.add('shaking-box');
        stick.classList.add('stick-popping');

        setTimeout(() => {
            box.classList.remove('shaking-box');
            stick.classList.remove('stick-popping');

            const luck = omikujiLucks[Math.floor(Math.random() * omikujiLucks.length)];
            const insight = omikujiInsights[Math.floor(Math.random() * omikujiInsights.length)];
            const yi = omikujiYis[Math.floor(Math.random() * omikujiYis.length)];
            const color = omikujiColors[Math.floor(Math.random() * omikujiColors.length)];
            const item = omikujiItems[Math.floor(Math.random() * omikujiItems.length)];

            document.getElementById('omikuji-luck').innerText = luck;
            document.getElementById('omikuji-insight').innerText = insight;
            document.getElementById('omikuji-yi').innerText = yi;
            document.getElementById('omikuji-color').innerText = color;
            document.getElementById('omikuji-item').innerText = item;

            const todayStr = new Date().toISOString().split('T')[0];
            const fortuneData = { luck, insight, yi, color, item };
            localStorage.setItem('omikuji_date', todayStr);
            localStorage.setItem('omikuji_data', JSON.stringify(fortuneData));

            drawZone.style.display = 'none';
            resultZone.style.display = 'block';
        }, 800);
    }

    function checkTodayOmikuji() {
        const savedDate = localStorage.getItem('omikuji_date');
        const savedDataStr = localStorage.getItem('omikuji_data');
        const todayStr = new Date().toISOString().split('T')[0];

        const drawZone = document.getElementById('omikuji-draw-zone');
        const resultZone = document.getElementById('omikuji-result-zone');

        if (savedDate === todayStr && savedDataStr) {
            const data = JSON.parse(savedDataStr);
            document.getElementById('omikuji-luck').innerText = data.luck;
            document.getElementById('omikuji-insight').innerText = data.insight;
            document.getElementById('omikuji-yi').innerText = data.yi;
            document.getElementById('omikuji-color').innerText = data.color;
            document.getElementById('omikuji-item').innerText = data.item;

            if (drawZone && resultZone) {
                drawZone.style.display = 'none';
                resultZone.style.display = 'block';
            }
        }
    }

    function resetOmikuji() {
        const drawZone = document.getElementById('omikuji-draw-zone');
        const resultZone = document.getElementById('omikuji-result-zone');
        if (drawZone && resultZone) {
            localStorage.removeItem('omikuji_date');
            localStorage.removeItem('omikuji_data');
            resultZone.style.display = 'none';
            drawZone.style.display = 'block';
        }

    // --- STREAMING_CHUNK: Setting up the floating menu collapse logic... ---
    // --- 懸浮折疊選單核心動態邏輯 ---
    let isFloatMenuOpen = false;

    function toggleFloatMenu() {
        const trigger = document.getElementById('float-trigger');
        const listItems = document.querySelectorAll('.float-item');
        const overlay = document.getElementById('float-overlay');
        
        isFloatMenuOpen = !isFloatMenuOpen;
        
        if (isFloatMenuOpen) {
            trigger.classList.add('active');
            overlay.classList.add('active');
            listItems.forEach(item => item.classList.add('show'));
        } else {
            trigger.classList.remove('active');
            overlay.classList.remove('active');
            listItems.forEach(item => item.classList.remove('show'));
        }
    }

    function scrollToSection(id) {
