<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice's Foodie Diary | 質感生活愛用清單</title>
    <style>
        :root {
            --bg-color: #fcf9f5;      /* 溫柔奶油米白 */
            --card-bg: #ffffff;       /* 純白卡片 */
            --text-main: #4a3e3d;     /* 質感深棕色 */
            --text-sub: #8a7e7c;      /* 暖灰色小字 */
            --accent-color: #d9c5b2;  /* 柔和大地色選單與按鈕 */
            --accent-hover: #c8b4a0;  
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            max-width: 600px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        /* 橫向滾動的極簡選單 (適合手機單手滑動) */
        .tab-menu {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 5px 15px 5px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Firefox 隱藏滾動條 */
        }

        .tab-menu::-webkit-scrollbar {
            display: none; /* Chrome/Safari 隱藏滾動條 */
        }

        .tab-btn {
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid #eaddd0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(165, 150, 140, 0.04);
        }

        /* 被選取時的奶油大地色狀態 */
        .tab-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 4px 10px rgba(217, 197, 178, 0.3);
        }

        /* 好物列表區塊 (預設隱藏，靠 JS 控制顯示) */
        .category-content {
            display: none;
        }

        .category-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 卡片設計 */
        .item-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 12px rgba(165, 150, 140, 0.06);
        }

        .item-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #f3ece4;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .item-info {
            flex-grow: 1;
            padding-right: 8px;
        }

        .item-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .item-info p {
            font-size: 0.78rem;
            color: var(--text-sub);
        }

        .item-btn {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 7px 12px;
            border-radius: 18px;
            white-space: nowrap;
            transition: background-color 0.2s ease;
        }

        .item-btn:hover {
            background-color: var(--accent-hover);
        }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <header>
        <h1>Alice's Foodie Diary</h1>
        <p>優雅日常的愛用私房清單</p>
    </header>

    <div class="container">

        <!-- 頂端選單按鈕（可自由左右滑動） -->
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('all')">全部愛用</button>
            <button class="tab-btn" onclick="switchTab('kitchen')">廚房美學</button>
            <button class="tab-btn" onclick="switchTab('stainless')">不鏽鋼用品</button>
            <button class="tab-btn" onclick="switchTab('storage')">收納提案</button>
            <button class="tab-btn" onclick="switchTab('bathroom')">浴室療癒</button>
        </div>

        <!-- 內容區塊開始 -->
        
        <!-- 【廚房美學】分類 -->
        <div id="kitchen" class="category-content active">
            <div class="item-card">
                <img class="item-img" src="https://via.placeholder.com/150/f3ece4/4a3e3d?text=Kitchen" alt="好物">
                <div class="item-info">
                    <h3>日系職人耐熱玻璃罐</h3>
                    <p>擺在廚房就是一道優雅的風景</p>
                </div>
                <a href="連結網址" class="item-btn" target="_blank">看好物</a>
            </div>
        </div>

        <!-- 【不鏽鋼用品】分類 -->
        <div id="stainless" class="category-content active">
            <div class="item-card">
                <img class="item-img" src="https://via.placeholder.com/150/f3ece4/4a3e3d?text=Stainless" alt="好物">
                <div class="item-info">
                    <h3>燕三条不鏽鋼瀝水架</h3>
                    <p>極簡線條，廚房不顯凌亂的秘密</p>
                </div>
                <a href="連結網址" class="item-btn" target="_blank">看好物</a>
            </div>
        </div>

        <!-- 【收納提案】分類 -->
        <div id="storage" class="category-content active">
            <div class="item-card">
                <img class="item-img" src="https://via.placeholder.com/150/f3ece4/4a3e3d?text=Storage" alt="好物">
                <div class="item-info">
                    <h3>日系極簡抽屜收納盒</h3>
                    <p>完美契合寬度，讓雜物整齊歸位</p>
                </div>
                <a href="連結網址" class="item-btn" target="_blank">看好物</a>
            </div>
        </div>

        <!-- 【浴室療癒】分類 -->
        <div id="bathroom" class="category-content active">
            <div class="item-card">
                <img class="item-img" src="https://via.placeholder.com/150/f3ece4/4a3e3d?text=Bathroom" alt="好物">
                <div class="item-info">
                    <h3>極簡風感應泡泡洗手機</h3>
                    <p>細緻慕斯，給日常洗手多一點儀式感</p>
                </div>
                <a href="連結網址" class="item-btn" target="_blank">看好物</a>
            </div>
        </div>

    </div>

    <footer>
        <p>© Alice's Foodie Diary</p>
    </footer>

    <!-- 自動控制選單切換的輕量腳本 -->
    <script>
        function switchTab(categoryId) {
            // 1. 切換按鈕的 active 狀態
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // 2. 控制分類內容的顯示/隱藏
            const contents = document.querySelectorAll('.category-content');
            
            if (categoryId === 'all') {
                // 如果點選「全部」，顯示所有分類
                contents.forEach(content => {
                    content.style.display = 'block';
                    content.classList.add('active');
                });
            } else {
                // 點選特定分類，只顯示該分類
                contents.forEach(content => {
                    if (content.id === categoryId) {
                        content.style.display = 'block';
                        content.classList.add('active');
                    } else {
                        content.style.display = 'none';
                        content.classList.remove('active');
                    }
                });
            }
        }
        
        // 預設一打開網頁顯示「全部愛用」
        window.onload = function() {
            switchTab('all');
        };
    </script>
</body>
</html>
