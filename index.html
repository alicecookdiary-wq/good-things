<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾莉絲的食光日記｜好物導航</title>
    <style>
        /* 頂級日系極簡與當代科技微光視覺 */
        :root {
            --bg-color: #FAF8F5;       /* 純淨奶油白 */
            --grid-color: rgba(223, 213, 201, 0.25); /* 浮空網格線條 */
            --card-bg: rgba(255, 255, 255, 0.85);    /* 霧面微透白 */
            --text-main: #4A443F;      /* 沉穩焙茶色 */
            --text-sub: #A39990;       /* 質樸木質灰 */
            --border-color: #EFEAE4;   /* 極細線條 */
            --accent-glow: #C5B4A5;    /* 燕麥微光 */
            --btn-active: #8E7F73;     /* 摩卡深色 */
            --baby-pink-bg: #FFF0EE;   /* 母嬰粉底色 */
            --baby-pink-border: #FCDAD5; /* 母嬰粉邊線 */
            --baby-pink-text: #C57B75;   /* 母嬰粉字體 */
            --baby-pink-active: #E29B96; /* 母嬰粉選中 */
            --shadow-sm: 0 4px 20px rgba(74, 68, 63, 0.02);
            --shadow-md: 0 8px 30px rgba(197, 180, 165, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                radial-gradient(circle at 10% 20%, rgba(242, 236, 230, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 197, 185, 0.3) 0%, transparent 50%);
            background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 0.6px;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            animation: fadeInPage 0.6s ease-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 頂部高級感磨砂玻璃標頭 --- */
        .hero-header {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }
        .hero-header h1 {
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .hero-header p {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 區塊外殼 --- */
        .page-section {
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 24px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .page-section:focus-within, .page-section:hover {
            border-color: var(--accent-glow);
            box-shadow: var(--shadow-md);
        }

        .section-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulseGlow 2s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px var(--accent-glow); }
        }

        .section-title-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }

        /* --- 代碼自動繪製：日系極簡生活感主圖橫幅 --- */
        .hero-banner-illustration {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: linear-gradient(135deg, #F3ECE5 0%, #EAE2D8 100%);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .banner-window {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .banner-shadow-leaves {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(163, 153, 144, 0.08) 0%, transparent 60%);
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .banner-shelf {
            position: absolute;
            width: 100%;
            height: 35px;
            background: #E5DBD0;
            bottom: 0;
            left: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -4px 10px rgba(74, 68, 63, 0.02);
        }
        .banner-bottles-group {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }
        .b-bottle-1 {
            width: 24px;
            height: 65px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 6px 6px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: -2px 4px 10px rgba(74, 68, 63, 0.05);
        }
        .b-bottle-1::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 10px;
            background: #EAE2D8;
            top: -10px;
            left: 5px;
            border-radius: 3px 1px 1px 1px;
        }
        .b-bottle-1::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 50px;
            background: rgba(142, 127, 115, 0.2);
            left: 11px;
            top: 5px;
        }
        .b-bottle-2 {
            width: 32px;
            height: 75px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px 8px 6px 6px;
            position: relative;
            backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 12px rgba(74, 68, 63, 0.06);
        }
        .b-bottle-2::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 8px;
            background: #FFFFFF;
            top: -8px;
            left: 11px;
        }
        .b-bottle-2::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 6px;
            background: #DCD2C7;
            top: -14px;
            left: 7px;
            border-radius: 2px 4px 2px 2px;
        }
        .b-bottle-3 {
            width: 28px;
            height: 52px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 5px 5px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 2px 4px 10px rgba(74, 68, 63, 0.04);
        }
        .b-bottle-3::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 6px;
            background: #C5B4A5;
            top: -6px;
            left: 4px;
            border-radius: 2px 2px 1px 1px;
        }

        /* --- 日手帳感可互動月曆手寫版式 --- */
        .calendar-section-outer {
            margin-bottom: 24px;
        }
        .calendar-months-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .calendar-nav-tab {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-sub);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background-color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .calendar-nav-tab.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            box-shadow: var(--shadow-sm);
        }
        .calendar-paper {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: inset 0 0 10px rgba(142, 127, 115, 0.02);
        }
        .calendar-header-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }
        .calendar-day-label {
            font-size: 0.65rem;
            color: var(--text-sub);
            font-weight: 600;
        }
        .calendar-days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 8px;
            column-gap: 4px;
            text-align: center;
        }
        .calendar-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-main);
            position: relative;
            border-radius: 6px;
        }
        .calendar-cell.muted {
            color: #E2DBD5;
        }
        /* 極簡多點點排版容器 */
        .calendar-dots-container {
            display: flex;
            gap: 2.5px;
            justify-content: center;
            position: absolute;
            bottom: 4px;
            width: 100%;
            pointer-events: none;
        }
        .calendar-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        /* --- 精緻色彩標示 (Calendar Legend) --- */
        .calendar-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            justify-content: center;
            padding: 0 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            color: var(--text-sub);
            font-weight: 500;
        }
        .legend-dot-indicator {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        /* --- 橫向流暢滑動複選濾鏡 --- */
        .filter-box {
            background: rgba(250, 248, 245, 0.7);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 2px;
        }
        .filter-buttons::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(142, 127, 115, 0.15);
        }

        /* --- 專屬莫蘭迪母嬰粉色按鈕樣式 --- */
        .filter-btn.baby-pink-btn {
            background-color: var(--baby-pink-bg);
            border-color: var(--baby-pink-border);
            color: var(--baby-pink-text);
        }
        .filter-btn.baby-pink-btn.active {
            background-color: var(--baby-pink-active) !important;
            border-color: var(--baby-pink-active) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 10px rgba(226, 155, 150, 0.25) !important;
        }

        /* --- 頂級流暢卡片流 --- */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .item-card {
            background-color: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInItem 0.4s ease-out forwards;
        }
        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item-card:active {
            transform: scale(0.97);
            background-color: rgba(239, 234, 228, 0.7);
            border-color: var(--accent-glow);
        }
        .item-card.hidden { display: none; }
        
        .item-img-container {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background-color: #EFEAE4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .item-info { flex: 1; }
        .item-name-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .item-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        
        /* 產地與特色精緻微勳章 - 僅限育兒用品標示 */
        .origin-badge {
            font-size: 0.625rem;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }
        .origin-tw { background-color: #EBF8F2; color: #1B7A54; border-color: #D3F1E3; }
        .origin-jp { background-color: #FDF2F2; color: #C82F2F; border-color: #FBE2E2; }
        .origin-fr { background-color: #F0F4FF; color: #2B5797; border-color: #E1E8FA; }

        .item-desc { font-size: 0.75rem; color: var(--text-sub); line-height: 1.45; }
        .item-arrow { 
            color: var(--text-sub); 
            font-size: 0.85rem; 
            margin-left: 8px; 
            transition: transform 0.3s ease;
        }
        .item-card:hover .item-arrow {
            transform: translateX(3px);
            color: var(--btn-active);
        }
        
        .status-tag { 
            font-size: 0.62rem; 
            background-color: #EFEAE4; 
            color: var(--btn-active); 
            padding: 2px 8px; 
            border-radius: 4px; 
            margin-bottom: 4px; 
            display: inline-block;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .date-tag {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-left: auto;
            font-weight: 500;
        }
        .no-results { text-align: center; padding: 20px 20px; color: var(--text-sub); font-size: 0.8rem; line-height: 1.6; }

        /* --- 預告微型縮小排版樣式 (微調篇幅大小) --- */
        #calendar-schedule-details .item-card {
            padding: 10px 14px;
            gap: 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: rgba(250, 248, 245, 0.4);
        }
        #calendar-schedule-details .item-name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        #calendar-schedule-details .item-desc {
            font-size: 0.68rem;
            line-height: 1.35;
            color: var(--text-sub);
            margin-top: 2px;
        }
        #calendar-schedule-details .date-tag {
            font-size: 0.68rem;
        }

        /* --- 心理測驗面板動態優化 --- */
        .quiz-container {
            background-color: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .quiz-question {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.5;
            color: var(--text-main);
            position: relative;
            padding-left: 12px;
        }
        .quiz-question::before {
            content: '';
            position: absolute;
            left: 0;
            top: 3px;
            width: 3px;
            height: 14px;
            background-color: var(--accent-glow);
            border-radius: 2px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .quiz-opt-btn {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            text-align: left;
            line-height: 1.45;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .quiz-opt-btn:active {
            transform: scale(0.98);
            border-color: var(--accent-glow);
            background-color: #FAF8F5;
        }
        
        .quiz-result-box {
            display: none;
            animation: fadeInResult 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
        }
        @keyframes fadeInResult { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .result-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--btn-active);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 1px;
        }
        .result-desc {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 24px;
            line-height: 1.55;
        }
        .quiz-reset-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 0.75rem;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin: 20px auto 0 auto;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        .quiz-reset-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- 頂部高級感標頭 -->
    <div class="hero-header">
        <h1>艾莉絲的食光日記</h1>
        <p>LIVING & SELECTED OBJECT</p>
    </div>

    <!-- 1. 目前開團中區塊 -->
    <div class="page-section">
        <div class="section-title-container">
            <div class="glow-dot"></div>
            <div class="section-title-text">目前開團中</div>
            <span class="date-tag">6/22 - 6/28</span>
        </div>

        <!-- 🪐 網頁代碼 100% 內建繪製：日系生活感極簡主圖 (與頁面風格完美融為一體) -->
        <div class="hero-banner-illustration">
            <div class="banner-window"></div>
            <div class="banner-shadow-leaves"></div>
            <div class="banner-shelf"></div>
            <div class="banner-bottles-group">
                <div class="b-bottle-1"></div>
                <div class="b-bottle-2"></div>
                <div class="b-bottle-3"></div>
            </div>
        </div>

        <div class="items-list">
            <!-- 移除前方方框後的極簡卡片 -->
            <a href="https://allbml.cc/e48hB" class="item-card" target="_blank">
                <div class="item-info">
                    <div class="item-name">淨毒五郎限時團購</div>
                    <div class="item-desc">天然植萃成分，細緻守護每個日常潔淨。</div>
                </div>
                <div class="item-arrow">→</div>
            </a>
        </div>
    </div>

    <!-- 2. 即將開團預告手帳行事曆區塊 -->
    <div class="page-section">
        <div class="section-title-container">
            <div class="glow-dot"></div>
            <div class="section-title-text">即將開團預告</div>
        </div>

        <div class="calendar-section-outer">
            <!-- 月份切換標籤 -->
            <div class="calendar-months-nav">
                <button class="calendar-nav-tab active" onclick="switchCalendarMonth(7)">7 月</button>
                <button class="calendar-nav-tab" onclick="switchCalendarMonth(8)">8 月</button>
                <button class="calendar-nav-tab" onclick="switchCalendarMonth(9)">9 月</button>
            </div>

            <!-- 月曆紙面板 -->
            <div class="calendar-paper">
                <div class="calendar-header-grid">
                    <span class="calendar-day-label">日</span>
                    <span class="calendar-day-label">一</span>
                    <span class="calendar-day-label">二</span>
                    <span class="calendar-day-label">三</span>
                    <span class="calendar-day-label">四</span>
                    <span class="calendar-day-label">五</span>
                    <span class="calendar-day-label">六</span>
                </div>
                <!-- 日期格將由 JS 動態完美生成 -->
                <div class="calendar-days-grid" id="calendar-days-container"></div>
                
                <!-- 精緻彩色點點說明標示 (Legend) -->
                <div class="calendar-legend" id="calendar-legend-container"></div>

    function renderCalendar() {
        const daysContainer = document.getElementById('calendar-days-container');
        const detailsContainer = document.getElementById('calendar-schedule-details');
        const legendContainer = document.getElementById('calendar-legend-container');
        if (!daysContainer || !detailsContainer || !legendContainer) return;

        daysContainer.innerHTML = '';
        detailsContainer.innerHTML = '';
        legendContainer.innerHTML = '';

        const mData = scheduleData[activeMonth];
        
        // 1. 補白上月空餘格
        for (let i = 0; i < mData.startDayOffset; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell muted';
            cell.innerHTML = '<span class="calendar-cell-num"></span>';
            daysContainer.appendChild(cell);
        }

        // 2. 渲染當月日子與多檔連動點點
        for (let day = 1; day <= mData.daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerHTML = `<span class="calendar-cell-num">${day}</span>`;

            // 建立點點容器
            const dotsContainer = document.createElement('div');
            dotsContainer.className = 'calendar-dots-container';

            mData.events.forEach((ev, evIdx) => {
                if (day >= ev.start && day <= ev.end) {
                    const dot = document.createElement('div');
                    dot.className = 'calendar-dot';
                    dot.style.backgroundColor = eventDotColors[evIdx % eventDotColors.length];
                    dotsContainer.appendChild(dot);
                }
            });

            if (dotsContainer.children.length > 0) {
                cell.appendChild(dotsContainer);
            }

            daysContainer.appendChild(cell);
        }

        // 3. 渲染點點色彩標示說明 (Legend)
        mData.events.forEach((ev, evIdx) => {
            const legItem = document.createElement('div');
            legItem.className = 'legend-item';
            const color = eventDotColors[evIdx % eventDotColors.length];
            legItem.innerHTML = `
                <span class="legend-dot-indicator" style="background-color: ${color}"></span>
                <span>${ev.name}</span>
            `;
            legendContainer.appendChild(legItem);
        });

                </div>
            `;
            detailsContainer.appendChild(card);
        });
    }

    // --- 篩選與渲染核心引擎 (嚴格隔離常規與育兒、無產地不顯徽章) ---
    const filterButtons = document.querySelectorAll('.filter-btn');
    const itemsContainer = document.getElementById('navigation-items');
    const noResultsMsg = document.getElementById('no-results-msg');

    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const isBabyBtn = btn.classList.contains('baby-pink-btn');

            if (isBabyBtn) {
                // 如果點選育兒按鈕，清除所有常規好物的選取
                document.querySelectorAll('.filter-btn:not(.baby-pink-btn)').forEach(b => b.classList.remove('active'));
                // 並且只保留當前這一個育兒按鈕 active (單選育兒子分類)
                document.querySelectorAll('.baby-pink-btn').forEach(b => { if (b !== btn) b.classList.remove('active'); });
            } else {
                // 如果點選常規好物按鈕，清除所有育兒專屬按鈕的選取 (達到完全隔離)
                document.querySelectorAll('.filter-btn.baby-pink-btn').forEach(b => b.classList.remove('active'));
            }

            btn.classList.toggle('active');
            filterItems();
        });
    });

    // 手寫高辨識度育兒SVG線條圖示 (常規好物點選後不顯圖片外框)
    function renderFilteredItems() {
        // This is handled by filterItems() function dynamically below
    }

    function filterItems() {
        const activeSpace = Array.from(document.querySelectorAll('.filter-group:nth-child(1) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activePurpose = Array.from(document.querySelectorAll('.filter-group:nth-child(2) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeMaterial = Array.from(document.querySelectorAll('.filter-group:nth-child(3) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeBaby = Array.from(document.querySelectorAll('.baby-pink-btn.active')).map(btn => btn.getAttribute('data-filter'));

        if (!itemsContainer || !noResultsMsg) return;

        // 1. 如果點選育兒按鈕：直接跳出對應育兒商品（隔離）
        if (activeBaby.length > 0) {
            const filteredBaby = allProductsData.filter(prod => {
                if (!prod.isBaby) return false;
                const prodTags = prod.tags.split(' ');
                return activeBaby.some(filter => prodTags.includes(filter));
            });

            renderList(filteredBaby);
            return;
        }

        // 2. 如果點選一般好物，必須【空間 + 用途 + 材質】三個大類各至少點選一個，否則不顯示任何卡片，避免過多
        if (activeSpace.length === 0 || activePurpose.length === 0 || activeMaterial.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "請同時點選「空間」、「用途」與「材質」大類，解鎖私房推薦好物 🤎";
            noResultsMsg.style.display = 'block';
            return;
        }

        // 3. 常規生活好物交叉過濾
        const filteredGeneral = allProductsData.filter(prod => {
            if (prod.isBaby) return false; // 嚴格屏蔽育兒用品
            const prodTags = prod.tags.split(' ');
            
            const matchesSpace = activeSpace.some(f => prodTags.includes(f));
            const matchesPurpose = activePurpose.some(f => prodTags.includes(f));
            const matchesMaterial = activeMaterial.some(f => prodTags.includes(f));

            return matchesSpace && matchesPurpose && matchesMaterial;
        });

        renderList(filteredGeneral);
    }

    function renderList(list) {
        if (!itemsContainer || !noResultsMsg) return;

        if (list.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "未找到符合交叉條件的物件";
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
            itemsContainer.innerHTML = '';

            list.forEach(prod => {
                const card = document.createElement('a');
                card.href = prod.url;
                card.target = "_blank";
                card.className = "item-card";

                // 產地標章 (嚴格限制：僅育兒專利商品才顯示)
                const badgeHTML = (prod.isBaby && prod.origin) 
                    ? `<span class="origin-badge ${getBadgeClass(prod.origin)}">${prod.origin}</span>` 
                    : '';

                // 圖片欄位：育兒專區有精細手繪線條SVG圖示，常規好物不顯外框（或使用通用莫蘭迪線稿SVG，保持高質感）
                const itemImgHTML = prod.isBaby
                    ? `<div class="item-img-container">${prod.svg}</div>`
                    : `<div class="item-img-container">
                        <svg viewBox="0 0 64 64" fill="none" stroke="#8E7F73" stroke-width="2" class="w-10 h-10">
                            <rect x="18" y="14" width="28" height="36" rx="3" fill="#EFEAE4"/>
                            <path d="M24 24h16M24 32h16M24 40h10" stroke-linecap="round"/>
                        </svg>
                       </div>`;

                card.innerHTML = `
                    ${itemImgHTML}
                    <div class="item-info">
                        <div class="item-name-row">
                            <span class="item-name">${prod.name}</span>
                            ${badgeHTML}
                        </div>
                        <div class="item-desc">${prod.desc}</div>
                    </div>
                    <div class="item-arrow">→</div>
                `;
                itemsContainer.appendChild(card);
            });
        }
    }

    function getBadgeClass(origin) {
        if (origin.includes("台灣")) return "origin-tw";
        if (origin.includes("日本")) return "origin-jp";
        if (origin.includes("法國")) return "origin-fr";
        return "";
    }

    let currentQIdx = 0;
    let scoreArray = [0, 0, 0];

    function loadQuestion() {
        const playBox = document.getElementById('quiz-play-box');
        const resultView = document.getElementById('quiz-result-view');
        
        if (!playBox || !resultView) return;

        playBox.style.display = 'block';
        resultView.style.display = 'none';

        if (currentQIdx < quizData.length) {
            const qText = document.getElementById('quiz-question-text');
            if (qText) qText.innerText = quizData[currentQIdx].q;
            
            const optionsBox = document.getElementById('quiz-options-box');
            if (optionsBox) {
                optionsBox.innerHTML = '';
                quizData[currentQIdx].opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-opt-btn';
                    btn.innerText = opt;
                    btn.onclick = function() {
                        scoreArray[idx]++;
                        currentQIdx++;
                        loadQuestion();
                    };
                    optionsBox.appendChild(btn);
                });
            }
        } else {
            showQuizResult();
        }
    }

    function showQuizResult() {
        const playBox = document.getElementById('quiz-play-box');
        const resultView = document.getElementById('quiz-result-view');
        
        if (!playBox || !resultView) return;

        playBox.style.display = 'none';
        resultView.style.display = 'block';

        let maxIdx = scoreArray.indexOf(Math.max(...scoreArray));
        if (maxIdx === -1) maxIdx = 0;
        const finalResult = resultPools[maxIdx];

        const rTitle = document.getElementById('res-title');
        const rDesc = document.getElementById('res-desc');
        if (rTitle) rTitle.innerText = finalResult.title;
        if (rDesc) rDesc.innerText = finalResult.desc;

        const randomProduct = recommendPool[Math.floor(Math.random() * recommendPool.length)];
        const placement = document.getElementById('random-product-placement');

            placement.innerHTML = `

                    <div class="item-arrow">→</div>
                </a>
            `;

    function resetQuiz() {
        currentQIdx = 0;
        scoreArray = [0, 0, 0];
