<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice Daily｜好物導航</title>
    <style>
        /* 頂級日系極簡與當代科技微光視覺 */
        :root {
            --bg-color: #FAF8F5;       /* 純淨奶油白 */
            --grid-color: rgba(223, 213, 201, 0.25); /* 浮空網格線條 */
            --card-bg: rgba(255, 255, 255, 0.85);    /* 霧面微透白 */
            --text-main: #4A443F;      /* 沉穩焙茶色 */
            --text-sub: #A39990;       /* 質樸木質灰 */
            --border-color: #EFEAE4;   /* 極細線條 */
            --accent-glow: #C5B4A5;    /* 燕麥微光 */
            --btn-active: #8E7F73;     /* 摩卡深色 */
            --baby-pink-bg: #FFF0EE;   /* 母嬰粉底色 */
            --baby-pink-border: #FCDAD5; /* 母嬰粉邊線 */
            --baby-pink-text: #C57B75;   /* 母嬰粉字體 */
            --baby-pink-active: #E29B96; /* 母嬰粉選中 */
            --shadow-sm: 0 4px 20px rgba(74, 68, 63, 0.02);
            --shadow-md: 0 8px 30px rgba(197, 180, 165, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                radial-gradient(circle at 10% 20%, rgba(242, 236, 230, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 197, 185, 0.3) 0%, transparent 50%);
            background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 0.6px;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px 100px; /* 底部預留空間防止懸浮選單遮擋 */
            animation: fadeInPage 0.6s ease-out;
            position: relative;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 頂部高級感磨砂玻璃標頭 --- */
        .hero-header {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }
        .hero-header h1 {
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .hero-header p {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 每日抽籤專屬日本神社與手帳美學動態樣式 --- */
        @keyframes shakeOmikuji {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            12% { transform: translateY(-10px) rotate(-14deg); }
            24% { transform: translateY(-3px) rotate(12deg); }
            36% { transform: translateY(-12px) rotate(-16deg); }
            48% { transform: translateY(-2px) rotate(14deg); }
            60% { transform: translateY(-10px) rotate(-10deg); }
            72% { transform: translateY(-4px) rotate(8deg); }
            84% { transform: translateY(-1px) rotate(-4deg); }
            92% { transform: translateY(0) rotate(2deg); }
        }
        @keyframes stickOut {
            0% { transform: translateY(0); filter: drop-shadow(0 0 0 rgba(197, 180, 165, 0)); }
            100% { transform: translateY(-26px); filter: drop-shadow(0 0 10px rgba(197, 180, 165, 0.8)); }
        }
        @keyframes slideUpSlip {
            from { opacity: 0; transform: translateY(22px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .shaking-box {
            animation: shakeOmikuji 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .stick-popping {
            animation: stickOut 0.9s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .slide-up-slip-anim {
            animation: slideUpSlip 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- 專屬日系手帳感：今日御神籤重新抽籤按鈕 --- */
        .omikuji-reset-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .omikuji-reset-btn:hover {
            border-color: var(--accent-glow);
            color: var(--text-main);
            background-color: rgba(239, 234, 228, 0.25);
        }
        .omikuji-reset-btn:active {
            transform: scale(0.96);
        }

        /* --- 區塊外殼 --- */
        .page-section {
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 24px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            scroll-margin-top: 24px; /* 防止錨點滾動時被邊緣切到 */
        }
        
        .page-section:focus-within, .page-section:hover {
            border-color: var(--accent-glow);
            box-shadow: var(--shadow-md);
        }

        .section-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulseGlow 2s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px var(--accent-glow); }
        }

        .section-title-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }

        /* --- 代碼自動繪製：日系生活感極簡主圖橫幅 --- */
        .hero-banner-illustration {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: linear-gradient(135deg, #F3ECE5 0%, #EAE2D8 100%);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .banner-window {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .banner-shadow-leaves {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(163, 153, 144, 0.08) 0%, transparent 60%);
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .banner-shelf {
            position: absolute;
            width: 100%;
            height: 35px;
            background: #E5DBD0;
            bottom: 0;
            left: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -4px 10px rgba(74, 68, 63, 0.02);
        }
        .banner-bottles-group {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }
        .b-bottle-1 {
            width: 24px;
            height: 65px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 6px 6px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: -2px 4px 10px rgba(74, 68, 63, 0.05);
        }
        .b-bottle-1::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 10px;
            background: #EAE2D8;
            top: -10px;
            left: 5px;
            border-radius: 3px 1px 1px 1px;
        }
        .b-bottle-1::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 50px;
            background: rgba(142, 127, 115, 0.2);
            left: 11px;
            top: 5px;
        }
        .b-bottle-2 {
            width: 32px;
            height: 75px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px 8px 6px 6px;
            position: relative;
            backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 12px rgba(74, 68, 63, 0.06);
        }
        .b-bottle-2::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 8px;
            background: #FFFFFF;
            top: -8px;
            left: 11px;
        }
        .b-bottle-2::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 6px;
            background: #DCD2C7;
            top: -14px;
            left: 7px;
            border-radius: 2px 4px 2px 2px;
        }
        .b-bottle-3 {
            width: 28px;
            height: 52px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 5px 5px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 2px 4px 10px rgba(74, 68, 63, 0.04);
        }
        .b-bottle-3::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 6px;
            background: #C5B4A5;
            top: -6px;
            left: 4px;
            border-radius: 2px 2px 1px 1px;
        }

        /* --- 微縮版開團計畫行事曆專屬手繪美學樣式 --- */
        .calendar-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .calendar-title-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #D3C5B5; /* 溫暖木質沙褐色 */
        }
        .calendar-title-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }
        .calendar-title-line {
            border: none;
            border-top: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .calendar-section-outer {
            margin-bottom: 16px;
        }
        .calendar-months-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
        }
        .calendar-nav-tab {
            flex: 1;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-sub);
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .calendar-nav-tab.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            box-shadow: 0 4px 12px rgba(142, 127, 115, 0.15);
        }
        .calendar-paper {
            background-color: transparent;
            border: none;
            padding: 0;
            box-shadow: none;
        }
        .calendar-header-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
        }
        .calendar-day-label {
            font-size: 0.78rem;
            color: var(--text-sub);
            font-weight: 500;
        }
        .calendar-days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 4px;
            column-gap: 6px;
            text-align: center;
            margin-bottom: 12px;
        }
        .calendar-cell {
            aspect-ratio: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-main);
            position: relative;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .calendar-cell.muted {
            color: #D1C9C0;
        }
        .calendar-cell.hl-neoflam { background-color: #E5DBD0 !important; color: #4A443F !important; font-weight: 600; }
        .calendar-cell.hl-sanko { background-color: #D8E2DC !important; color: #2D4F38 !important; font-weight: 600; }
        .calendar-cell.hl-spacebox { background-color: #FFF0EE !important; color: #C57B75 !important; font-weight: 600; }
        .calendar-cell.hl-yansantiao { background-color: #DCE1E5 !important; color: #2F435A !important; font-weight: 600; }
        .calendar-cell.hl-oxo { background-color: #F5E5D9 !important; color: #834E2B !important; font-weight: 600; }
        .calendar-cell.hl-bonson { background-color: #EAE5F5 !important; color: #5E3D85 !important; font-weight: 600; }

        .calendar-divider-dashed {
            border: none;
            border-top: 1px dashed #E2DBD5;
            margin: 20px 0;
        }
        .calendar-event-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 4px;
        }
        .calendar-event-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .calendar-event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .calendar-event-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .calendar-event-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .calendar-event-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .calendar-event-date {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 500;
        }
        .calendar-event-desc {
            font-size: 0.78rem;
            color: var(--text-sub);
            line-height: 1.45;
        }

        /* --- 橫向流暢滑動複選濾鏡 --- */
        .filter-box {
            background: rgba(250, 248, 245, 0.7);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 2px;
        }
        .filter-buttons::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(142, 127, 115, 0.15);
        }

        /* --- 專屬莫蘭迪母嬰粉色按鈕樣式 --- */
        .filter-btn.baby-pink-btn {
            background-color: var(--baby-pink-bg);
            border-color: var(--baby-pink-border);
            color: var(--baby-pink-text);
        }
        .filter-btn.baby-pink-btn.active {
            background-color: var(--baby-pink-active) !important;
            border-color: var(--baby-pink-active) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 10px rgba(226, 155, 150, 0.25) !important;
        }

        /* --- 頂級流暢卡片流 --- */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .item-card {
            background-color: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInItem 0.4s ease-out forwards;
        }
        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item-card:active {
            transform: scale(0.97);
            background-color: rgba(239, 234, 228, 0.7);
            border-color: var(--accent-glow);
        }
        .item-card.hidden { display: none; }
        
        .item-img-container {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background-color: #EFEAE4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .item-img-container svg {
            width: 38px;
            height: 38px;
            display: block;
        }
        .item-info { flex: 1; }
        .item-name-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .item-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        
        .origin-badge {
            font-size: 0.625rem;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }
        .origin-tw { background-color: #EBF8F2; color: #1B7A54; border-color: #D3F1E3; }
        .origin-jp { background-color: #FDF2F2; color: #C82F2F; border-color: #FBE2E2; }
        .origin-fr { background-color: #F0F4FF; color: #2B5797; border-color: #E1E8FA; }

        .item-desc { font-size: 0.75rem; color: var(--text-sub); line-height: 1.45; }
        .item-arrow { 
            color: var(--text-sub); 
            font-size: 0.85rem; 
            margin-left: 8px; 
            transition: transform 0.3s ease;
        }
        .item-card:hover .item-arrow {
            transform: translateX(3px);
            color: var(--btn-active);
        }
        
        .status-tag-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .status-tag { 
            font-size: 0.62rem; 
            background-color: #EFEAE4; 
            color: var(--btn-active); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .text-legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .date-tag {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-left: auto;
            font-weight: 500;
        }
        .no-results { text-align: center; padding: 20px 20px; color: var(--text-sub); font-size: 0.8rem; line-height: 1.6; }

        #calendar-schedule-details .item-card {
            padding: 10px 14px;
            gap: 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: rgba(250, 248, 245, 0.4);
        }
        #calendar-schedule-details .item-name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        #calendar-schedule-details .item-desc {
            font-size: 0.68rem;
            line-height: 1.35;
            color: var(--text-sub);
            margin-top: 2px;
        }
        #calendar-schedule-details .date-tag {
            font-size: 0.68rem;
        }

        /* 搜尋好物輸入框專屬極簡美學 */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
        }
        .search-input:focus {
            border-color: var(--accent-glow);
            background-color: #FFFFFF;
            box-shadow: var(--shadow-md);
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--text-sub);
            transition: stroke 0.3s ease;
            pointer-events: none;
        }
        .search-input:focus + .search-icon {
            stroke: var(--btn-active);
        }

        /* --- 懸浮美學折導航專屬樣式 --- */
        .floating-nav-container {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;

        daysContainer.innerHTML = '';

            7: [28, 29, 30],
            8: [26, 27, 28, 29, 30, 31],
            9: [30, 31]
        };
        const prevMuted = prevMonthMutedDays[activeMonth] || [];
        prevMuted.forEach(dNum => {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell muted';
            cell.innerHTML = `<span>${dNum}</span>`;
            daysContainer.appendChild(cell);
        });

        // 2. 渲染當月的所有日期格與高亮區塊
        for (let day = 1; day <= mData.daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerHTML = `<span>${day}</span>`;

            let keyMatch = null;
            mData.events.forEach(ev => {
                if (day >= ev.start && day <= ev.end) {
                    keyMatch = ev.key;
                }
            });

            if (keyMatch) {
                const colorInfo = eventColors[keyMatch];
                cell.classList.add(colorInfo.class);
            }

            daysContainer.appendChild(cell);
        }

        // 3. 補齊下一個月開始的淡色格子
        const totalCells = prevMuted.length + mData.daysInMonth;
        const remainder = totalCells % 7;
        if (remainder !== 0) {
            const nextMutedCount = 7 - remainder;
            for (let day = 1; day <= nextMutedCount; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell muted';
                cell.innerHTML = `<span>${day}</span>`;
                daysContainer.appendChild(cell);
            }
        }

        const activeList = monthEventLists[activeMonth] || [];
        activeList.forEach(key => {
            const info = eventColors[key];
            const eventItem = document.createElement('div');
            eventItem.className = 'calendar-event-item';

                        <span class="calendar-event-date">${info.date}</span>
                    </div>
                    <span class="calendar-event-desc">${info.desc}</span>
                </div>
            `;
            detailsContainer.appendChild(eventItem);
        });
    }

    const filterButtons = document.querySelectorAll('.filter-btn');
    const itemsContainer = document.getElementById('navigation-items');
    const noResultsMsg = document.getElementById('no-results-msg');
    const searchInput = document.getElementById('product-search-input');

    // 搜尋輸入監聽：輸入時清除篩選按鈕狀態，並進行全域搜尋
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim() !== "") {
                filterButtons.forEach(btn => btn.classList.remove('active'));
            }
            filterItems();
        });
    }

    // 設定好物篩選交互邏輯
    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const isBabyBtn = btn.classList.contains('baby-pink-btn');
            // 點擊篩選按鈕時，清空搜尋框以避免邏輯衝突
            if (searchInput) {
                searchInput.value = "";
            }
            if (isBabyBtn) {
                document.querySelectorAll('.filter-btn:not(.baby-pink-btn)').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.baby-pink-btn').forEach(b => { if (b !== btn) b.classList.remove('active'); });
            } else {
                document.querySelectorAll('.filter-btn.baby-pink-btn').forEach(b => b.classList.remove('active'));
            }
            btn.classList.toggle('active');
            filterItems();
        });
    });

    function filterItems() {
        const searchQuery = searchInput ? searchInput.value.trim().toLowerCase() : "";

        // 若有輸入搜尋關鍵字，優先進行全域模糊比對
        if (searchQuery !== "") {
            const filtered = allProductsData.filter(prod => {
                return prod.name.toLowerCase().includes(searchQuery) ||
                       prod.desc.toLowerCase().includes(searchQuery) ||
                       prod.tags.toLowerCase().includes(searchQuery);
            });
            renderList(filtered);
            return;
        }

        const activeSpace = Array.from(document.querySelectorAll('.filter-group:nth-child(1) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activePurpose = Array.from(document.querySelectorAll('.filter-group:nth-child(2) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeMaterial = Array.from(document.querySelectorAll('.filter-group:nth-child(3) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeBaby = Array.from(document.querySelectorAll('.baby-pink-btn.active')).map(btn => btn.getAttribute('data-filter'));

        if (!itemsContainer || !noResultsMsg) return;

        if (activeBaby.length > 0) {
            const filteredBaby = allProductsData.filter(prod => {
                if (!prod.isBaby) return false;
                const prodTags = prod.tags.split(' ');
                return activeBaby.some(filter => prodTags.includes(filter));
            });
            renderList(filteredBaby);
            return;
        }

        if (activeSpace.length === 0 || activePurpose.length === 0 || activeMaterial.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "請同時點選「空間」、「用途」與「材質」大類，解鎖私房愛用好物 🤎";
            noResultsMsg.style.display = 'block';
            return;
        }

        const filteredGeneral = allProductsData.filter(prod => {
            if (prod.isBaby) return false;
            const prodTags = prod.tags.split(' ');
            const matchesSpace = activeSpace.some(f => prodTags.includes(f));
            const matchesPurpose = activePurpose.some(f => prodTags.includes(f));
            const matchesMaterial = activeMaterial.some(f => prodTags.includes(f));
            return matchesSpace && matchesPurpose && matchesMaterial;
        });
        renderList(filteredGeneral);
    }

    function renderList(list) {
        if (!itemsContainer || !noResultsMsg) return;

        if (list.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "未找到符合交叉條件的物件";
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
            itemsContainer.innerHTML = '';

            list.forEach(prod => {
                const card = document.createElement('a');
                card.href = prod.url;
                card.target = "_blank";
                card.className = "item-card";

    // --- 合成日本神社高級磬鐘與重竹籤筒搖晃聲（Web Audio API） ---
    let audioCtx = null;
    function getAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        return audioCtx;
    }

    // 模擬中空竹籤筒內重竹籤碰撞、摩擦的木質敲擊沙沙聲
    function playShakeSound() {
        try {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            
            // 序列化 8 次具有豐富中空共鳴的木質竹籤拍打聲
            for (let i = 0; i < 8; i++) {
                const playTime = now + (i * 0.10) + (Math.random() * 0.02);
                
                // 竹子主體的敲擊中頻 (約 250Hz ~ 400Hz)
                const woodOsc = ctx.createOscillator();
                const woodGain = ctx.createGain();
                woodOsc.type = 'triangle';
                woodOsc.frequency.setValueAtTime(320 + Math.random() * 120, playTime);
                woodOsc.frequency.exponentialRampToValueAtTime(120, playTime + 0.04);
                
                woodGain.gain.setValueAtTime(0.35, playTime);
                woodGain.gain.exponentialRampToValueAtTime(0.001, playTime + 0.045);
                
                // 竹子中空筒身共鳴低頻腔體音 (110Hz)
                const bodyOsc = ctx.createOscillator();
                const bodyGain = ctx.createGain();
                bodyOsc.type = 'sine';
                bodyOsc.frequency.setValueAtTime(110, playTime);
                bodyGain.gain.setValueAtTime(0.2, playTime);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, playTime + 0.07);

                // 細微木頭表面刮擦高頻帶通雜訊
                const bufferSize = ctx.sampleRate * 0.025;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < bufferSize; j++) {
                    data[j] = Math.random() * 2 - 1;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.setValueAtTime(1200 + Math.random() * 400, playTime);
                noiseFilter.Q.setValueAtTime(5, playTime);
                
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.12, playTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, playTime + 0.025);

                // 連接輸出
                woodOsc.connect(woodGain);
                woodGain.connect(ctx.destination);
                
                bodyOsc.connect(bodyGain);
                bodyGain.connect(ctx.destination);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                
                woodOsc.start(playTime);
                woodOsc.stop(playTime + 0.05);
                bodyOsc.start(playTime);
                bodyOsc.stop(playTime + 0.08);
                noise.start(playTime);
                noise.stop(playTime + 0.03);
            }
        } catch (e) {
            console.warn("Audio Context failed to play shake sound:", e);
        }
    }

    // 模擬日本神社手抄本、青銅磬鐘（Orin）與神樂鈴（Suzu）奢華高頻餘音
    function playResultSound() {
        try {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            
            // 1. 神社磬鐘（Orin）：使用一組精密微調的Detuned正弦波群，形成絕妙的「聲學拍頻（Beating）」
            // 磬鐘的主頻 C5 (523Hz) + 高頻諧音共鳴
            const bellFreqs = [523.25, 524.50, 784.00, 1046.50, 1318.50]; // 523Hz 與 524.5Hz 產生美妙拍頻
            
            bellFreqs.forEach((freq, idx) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                
                // 磬鐘發聲漫長，長達 3.2 秒的優雅淡出
                const initialVol = idx === 0 || idx === 1 ? 0.35 : 0.12; 
                gain.gain.setValueAtTime(initialVol, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.2 - (idx * 0.2));
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now);
                osc.stop(now + 3.3);
            });

            // 2. 神樂鈴（Suzu）：伴隨磬鐘響起，合成一串清脆、快速抖動的「鈴鐺高頻閃爍音」
            for (let i = 0; i < 18; i++) {
                const jingleTime = now + (i * 0.04);
                const jingleOsc = ctx.createOscillator();
                const jingleGain = ctx.createGain();
                
                jingleOsc.type = 'sine';
                jingleOsc.frequency.setValueAtTime(2500 + Math.random() * 2000, jingleTime);
                
                // 模擬急速顫動的手搖感
                const volume = 0.05 * Math.sin((i / 18) * Math.PI); 
                jingleGain.gain.setValueAtTime(volume, jingleTime);
                jingleGain.gain.exponentialRampToValueAtTime(0.001, jingleTime + 0.06);
                
                jingleOsc.connect(jingleGain);
                jingleGain.connect(ctx.destination);
                
                jingleOsc.start(jingleTime);
                jingleOsc.stop(jingleTime + 0.07);
            }
        } catch (e) {
            console.warn("Audio Context failed to play result sound:", e);
        }
    }

    function drawOmikuji() {
        const box = document.getElementById('omikuji-box');
        const stick = document.getElementById('omikuji-stick');
        const drawZone = document.getElementById('omikuji-draw-zone');
        const resultZone = document.getElementById('omikuji-result-zone');
        if (!box || !stick || !drawZone || !resultZone) return;

        // 啟動全螢幕漫天櫻花與電影感發光粒子特效
        triggerFullEffect();

        // 觸發高質感竹籤筒中空碰撞木質聲效
        playShakeSound();

        box.classList.add('shaking-box');
        stick.classList.add('stick-popping');

        setTimeout(() => {
            box.classList.remove('shaking-box');
            stick.classList.remove('stick-popping');

            // 磬鐘與神樂鈴和弦揭曉音效
            playResultSound();

            const fortune = omikujiDatabase[Math.floor(Math.random() * omikujiDatabase.length)];

            document.getElementById('omikuji-luck').innerText = fortune.luck;
            document.getElementById('omikuji-insight').innerText = fortune.insight;
            document.getElementById('omikuji-yi').innerText = fortune.yi;
            document.getElementById('omikuji-color').innerText = fortune.color;
            document.getElementById('omikuji-item').innerText = fortune.item;

            const todayStr = new Date().toISOString().split('T')[0];
            localStorage.setItem('omikuji_date', todayStr);
            localStorage.setItem('omikuji_data', JSON.stringify(fortune));

            drawZone.style.display = 'none';
            resultZone.style.display = 'block';
        }, 900);
    }

    function checkTodayOmikuji() {
        const savedDate = localStorage.getItem('omikuji_date');
        const savedDataStr = localStorage.getItem('omikuji_data');
        const todayStr = new Date().toISOString().split('T')[0];

        const drawZone = document.getElementById('omikuji-draw-zone');
        const resultZone = document.getElementById('omikuji-result-zone');

        if (savedDate === todayStr && savedDataStr) {
            const data = JSON.parse(savedDataStr);
            document.getElementById('omikuji-luck').innerText = data.luck;
            document.getElementById('omikuji-insight').innerText = data.insight;
            document.getElementById('omikuji-yi').innerText = data.yi;

                drawZone.style.display = 'none';
                resultZone.style.display = 'block';

    // 全螢幕 3D 擬真翻動落櫻與香檳金發光粒子系統
    const effectCanvas = document.getElementById('effect-canvas');
    const ctx = effectCanvas.getContext('2d');
    let particles = [];
    let animationId = null;
    let isDrawingEffect = false;

    function resizeCanvas() {
        effectCanvas.width = window.innerWidth;
        effectCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    class PetalParticle {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 'sakura'（櫻花）或 'gold'（高雅香檳金光暈）
            
            if (type === 'sakura') {
                this.size = Math.random() * 10 + 6;
                this.alpha = 1;
                this.decay = Math.random() * 0.005 + 0.005; // 慢速優雅褪色
                
                // 3D 旋轉與風力搖擺屬性
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.04 - 0.02; // 自轉
                this.flipAngle = Math.random() * Math.PI; // 3D 翻轉面角度
                this.flipSpeed = Math.random() * 0.05 + 0.02; // 3D 翻轉速度
                
                // 初速度
                this.vx = Math.random() * 2 - 1;
                this.vy = Math.random() * 1 + 0.8;
                this.gravity = 0.02;
                this.swing = Math.random() * 0.03; 
                this.swingStep = Math.random() * 100;
            } else {
                // 發光金粉
                this.size = Math.random() * 14 + 6; // 光暈尺寸
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.008;
                
                // 向上緩慢漂浮
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 1.5; // 整體帶有向上的浮力
                this.gravity = -0.01; // 反重力
            }
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            
            // 空氣阻力
            this.vx *= 0.98;
            this.vy *= 0.98;

            if (this.type === 'sakura') {
                this.angle += this.spin;
                this.flipAngle += this.flipSpeed;
                this.swingStep += this.swing;
                this.x += Math.sin(this.swingStep) * 0.3; // 模擬風中飄移
            }

            this.alpha -= this.decay;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.translate(this.x, this.y);

            if (this.type === 'sakura') {
                ctx.rotate(this.angle);
                // 透過 Cosine 比例進行寬度壓縮，極致模擬 3D 花瓣翻轉！
                ctx.scale(Math.cos(this.flipAngle), 1);
                
                // 高雅透光和風莫蘭迪粉色櫻花
                ctx.fillStyle = '#FFF0EE';
                ctx.beginPath();
                ctx.moveTo(0, 0);
                // 繪製具厚度感之不對稱精美櫻花瓣
                ctx.bezierCurveTo(-this.size, -this.size / 2, -this.size, this.size / 2, 0, this.size);
                ctx.bezierCurveTo(this.size, this.size / 2, this.size, -this.size / 2, 0, 0);
                ctx.closePath();
                ctx.fill();

                // 畫花瓣的微細葉脈，增添精緻細節
                ctx.strokeStyle = 'rgba(240, 200, 195, 0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, this.size);
                ctx.stroke();
            } else {
                // 香檳金高貴發光光暈粒子 (使用 Radial Gradient 實現柔焦霧化光效)
                let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                grad.addColorStop(0, 'rgba(255, 253, 240, 0.95)');
                grad.addColorStop(0.3, 'rgba(211, 197, 181, 0.6)');
                grad.addColorStop(1, 'rgba(211, 197, 181, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    function animateParticles() {
        if (!isDrawingEffect) return;
        ctx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();
            if (p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }

        if (particles.length === 0) {
            isDrawingEffect = false;
            effectCanvas.style.display = 'none';
            cancelAnimationFrame(animationId);
        } else {
            animationId = requestAnimationFrame(animateParticles);
        }
    }

    function triggerFullEffect() {
        resizeCanvas();
        effectCanvas.style.display = 'block';
        particles = [];
        isDrawingEffect = true;

        const centerX = effectCanvas.width / 2;
        const centerY = effectCanvas.height / 3.2; // 爆發位置

        // 1. 搖籤預備階段：凝聚少許高雅金色光暈
        for (let i = 0; i < 25; i++) {
            const p = new PetalParticle(centerX + (Math.random() * 100 - 50), centerY + (Math.random() * 100 - 50), 'gold');
            p.vx = (Math.random() * 2 - 1);
            p.vy = (Math.random() * 2 - 1) - 1.2;
            particles.push(p);
        }

        // 2. 磬鐘響起階段（900ms 後）：漫天 3D 落櫻與溫潤金粉徐徐飄落、升起
        setTimeout(() => {
            // 爆發出 55 個 3D 旋轉擬真櫻花瓣
            for (let i = 0; i < 55; i++) {
                const p = new PetalParticle(centerX + (Math.random() * 160 - 80), centerY + (Math.random() * 120 - 60), 'sakura');
                p.vx = Math.random() * 5 - 2.5;
                p.vy = Math.random() * 4 - 1.5;
                particles.push(p);
            }
            // 爆發出 45 個金色發光星塵
            for (let i = 0; i < 45; i++) {
                const p = new PetalParticle(centerX, centerY, 'gold');
                p.vx = Math.random() * 6 - 3;
                p.vy = Math.random() * 5 - 3;
                particles.push(p);
            }
        }, 900);

        if (animationId) cancelAnimationFrame(animationId);
        animateParticles();
    }

    // --- 懸浮折疊選單核心動態邏輯 ---
    let isFloatMenuOpen = false;

    function toggleFloatMenu() {
        const trigger = document.getElementById('float-trigger');
        const listItems = document.querySelectorAll('.float-item');
        const overlay = document.getElementById('float-overlay');
        
        isFloatMenuOpen = !isFloatMenuOpen;
        
        if (isFloatMenuOpen) {
            trigger.classList.add('active');
            overlay.classList.add('active');
            listItems.forEach(item => item.classList.add('show'));
        } else {
            trigger.classList.remove('active');
            overlay.classList.remove('active');
            listItems.forEach(item => item.classList.remove('show'));
        }
    }

    // 平滑錨點滾動與自動閉合導航欄
    function scrollToSection(id) {
        const target = document.getElementById(id);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
        }
        // 點擊後自動收起導航，保持畫面清爽
        toggleFloatMenu();
    }

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        toggleFloatMenu();
    }

    // --- 頂級極速即時雲端計數器系統（帶 100% 安全本地備份） ---
    async function initVisitorStats() {
        const totalEl = document.getElementById('total-views');
        const monthlyEl = document.getElementById('monthly-views');
        const activeEl = document.getElementById('active-users');
        
        // 專案 ID 與 初始變數
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'alice-time-diary';
        let db = null;
        let auth = null;
        let user = null;
        let firebaseReady = false;

        // 1. 初始化 Firebase 客戶端
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                firebaseReady = true;
            } catch (err) {
                console.error("Firebase 初始化失敗，啟用本地快取機制:", err);
            }
        }

        // 2. 進行權限登入與即時同步讀寫（嚴格遵守 Firestore 規則）
        if (firebaseReady && auth && db) {
            try {
                // 認證優先
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    user = (await signInWithCustomToken(auth, __initial_auth_token)).user;
                } else {
                    user = (await signInAnonymously(auth)).user;
                }

                if (user) {
                    // 嚴格安全公用路徑
                    const statsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'counter');
                    
                    const docSnap = await getDoc(statsDocRef);
                    if (!docSnap.exists()) {
                        // 初始化資料庫，注入基本值
                        await setDoc(statsDocRef, {
                            totalViews: 5404,
                            monthlyViews: 59,
                            activeUsers: 1,
                            lastResetTime: Date.now()
                        });
                    } else {
                        // 執行累加 (觀看時自動 +1)
                        await updateDoc(statsDocRef, {
                            totalViews: increment(1),
                            monthlyViews: increment(1)
                        });
                    }

                    // 即時監聽：全網任何人載入，累積瀏覽數即時狂飆
                    onSnapshot(statsDocRef, (snapshot) => {
                        if (snapshot.exists()) {
                            const data = snapshot.data();
                            if (totalEl && data.totalViews) totalEl.innerText = data.totalViews;
                            if (monthlyEl && data.monthlyViews) monthlyEl.innerText = data.monthlyViews;
                        }
                    }, (err) => {
                        console.error("即時監聽異常:", err);
                    });

                    // 高互動按鈕點擊也算入高黏度實際使用人次 (廚房浴室篩選、求籤等)
                    document.addEventListener('click', async (e) => {
                        if (e.target.closest('.filter-btn') || e.target.closest('.calendar-nav-tab') || e.target.closest('.float-btn') || e.target.closest('#omikuji-draw-zone') || e.target.closest('.item-card')) {
                            try {
                                await updateDoc(statsDocRef, {
                                    totalViews: increment(1),
                                    monthlyViews: increment(1)
                                });
                            } catch (err) {
                                // 靜默處理高頻寫入
                            }
                        }
                    });
                } else {
                    runLocalFallback();
                }
            } catch (err) {
                console.error("Firestore 資料存取錯誤:", err);
                runLocalFallback();
            }
        } else {
            runLocalFallback();
        }

        // 3. 本地極簡模擬降級機制（無 Firebase 環境下完美相容）
        function runLocalFallback() {
            let totalViews = parseInt(localStorage.getItem('alice_total_views'));
            let monthlyViews = parseInt(localStorage.getItem('alice_monthly_views'));
            
            if (isNaN(totalViews)) {
                totalViews = 5403;
                localStorage.setItem('alice_total_views', totalViews);
            }
            if (isNaN(monthlyViews)) {
                monthlyViews = 58;
                localStorage.setItem('alice_monthly_views', monthlyViews);
            }
            
            totalViews += 1;
            monthlyViews += 1;
            
            localStorage.setItem('alice_total_views', totalViews);
            localStorage.setItem('alice_monthly_views', monthlyViews);
            
            if (totalEl) totalEl.innerText = totalViews;
            if (monthlyEl) monthlyEl.innerText = monthlyViews;
            
            setInterval(() => {
                if (Math.random() > 0.65) {
                    totalViews += 1;
                    if (Math.random() > 0.4) monthlyViews += 1;
                    localStorage.setItem('alice_total_views', totalViews);
                    localStorage.setItem('alice_monthly_views', monthlyViews);
                    if (totalEl) totalEl.innerText = totalViews;
                    if (monthlyEl) monthlyEl.innerText = monthlyViews;
                }
            }, 5000);

            document.addEventListener('click', (e) => {
                if (e.target.closest('.filter-btn') || e.target.closest('.calendar-nav-tab') || e.target.closest('.float-btn') || e.target.closest('#omikuji-draw-zone') || e.target.closest('.item-card')) {
                    totalViews += 1;
                    monthlyViews += 1;
                    localStorage.setItem('alice_total_views', totalViews);
                    localStorage.setItem('alice_monthly_views', monthlyViews);
                    if (totalEl) totalEl.innerText = totalViews;
                    if (monthlyEl) monthlyEl.innerText = monthlyViews;
                }
            });
        }
        
        // 4. 即時在線人數波動模擬（純前端即時視覺）
        let activeCount = Math.floor(Math.random() * 5) + 3; // 初始在線人數 3 ~ 7 人
        if (activeEl) activeEl.innerText = activeCount;
        
        setInterval(() => {
            let change = Math.floor(Math.random() * 3) - 1; // -1, 0, or 1
            activeCount = Math.max(1, activeCount + change);
            if (activeEl) activeEl.innerText = activeCount;
        }, 5000);
    }

    // 將所有模組內的事件響應函數註冊給全域 window 物件，確保 HTML inline 屬性(onclick)完全相容
    window.switchCalendarMonth = switchCalendarMonth;
    window.drawOmikuji = drawOmikuji;
    window.resetOmikuji = resetOmikuji;
    window.toggleFloatMenu = toggleFloatMenu;
    window.scrollToSection = scrollToSection;
    window.scrollToTop = scrollToTop;
    window.filterItems = filterItems;

    // 模組加載完成時自動初始化排程
    renderCalendar();
    checkTodayOmikuji();
    initVisitorStats();
</script>
