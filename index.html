<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾莉絲的食光日記｜精選好物導航</title>
    <style>
        /* 日系奶油風配色 */
        :root {
            --bg-color: #FBF9F6;       /* 極簡奶油白 */
            --card-bg: #FFFFFF;        /* 純白卡片 */
            --text-main: #5C544E;      /* 深焙茶色（柔和不刺眼） */
            --text-sub: #9E948A;       /* 淺木質灰 */
            --primary: #D4C5B9;        /* 經典奶油燕麥色 */
            --primary-light: #F2ECE6;  /* 輕柔燕麥膚色 */
            --accent: #A89685;         /* 焦糖摩卡色（選中狀態） */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 限制手機版寬度，置中精緻感 */
        .phone-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-color);
            padding: 24px 16px;
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-main);
            margin-bottom: 4px;
        }
        .header p {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        /* 複選濾鏡總容器 */
        .filter-section {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(168, 150, 133, 0.05);
        }

        .filter-group {
            margin-bottom: 12px;
        }
        .filter-group:last-child {
            margin-bottom: 0;
        }

        /* 標籤組標題 */
        .filter-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 6px;
            padding-left: 2px;
        }

        /* 橫向滾動標籤列 */
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 4px;
        }
        /* 隱藏滾動條 */
        .filter-buttons::-webkit-scrollbar {
            display: none;
        }

        /* 複選按鈕樣式 */
        .filter-btn {
            background-color: var(--bg-color);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
        }

        /* 被選中時的療癒奶油色深色狀態 */
        .filter-btn.active {
            background-color: var(--accent);
            color: #FFFFFF;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(168, 150, 133, 0.2);
        }

        /* 商品列表 */
        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 商品卡片 */
        .item-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(168, 150, 133, 0.03);
            transition: transform 0.2s ease, opacity 0.3s ease;
        }
        .item-card:active {
            transform: scale(0.98);
        }

        /* 卡片隱藏時的動畫 */
        .item-card.hidden {
            display: none;
        }

        /* 商品圖片預留區 */
        .item-img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            background-color: var(--primary-light);
            object-fit: cover;
            margin-right: 14px;
        }

        .item-info {
            flex: 1;
        }
        .item-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-main);
        }
        .item-desc {
            font-size: 0.8rem;
            color: var(--text-sub);
            line-height: 1.3;
        }

        /* 點擊箭頭 */
        .item-arrow {
            color: var(--primary);
            font-size: 1.2rem;
            margin-left: 8px;
        }

        /* 無搜尋結果提示 */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-sub);
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- 頂部標題區 -->
    <div class="header">
        <h1>艾莉絲的食光日記</h1>
        <p>療癒生活｜愛用好物與團購導航</p>
    </div>

    <!-- 複選篩選器 -->
    <div class="filter-section">
        <!-- 第一組：空間 -->
        <div class="filter-group">
            <div class="filter-title">空間範圍</div>
            <div class="filter-buttons" id="group-space">
                <button class="filter-btn" data-filter="廚房">廚房</button>
                <button class="filter-btn" data-filter="浴室">浴室</button>
                <button class="filter-btn" data-filter="臥室">臥室</button>
                <button class="filter-btn" data-filter="其他居家">其他居家</button>
            </div>
        </div>
        
        <!-- 第二組：類型 -->
        <div class="filter-group">
            <div class="filter-title">用途分類</div>
            <div class="filter-buttons" id="group-type">
                <button class="filter-btn" data-filter="收納">收納</button>
                <button class="filter-btn" data-filter="好物">好物</button>
                <button class="filter-btn" data-filter="清潔">清潔</button>
            </div>
        </div>

        <!-- 第三組：材質 -->
        <div class="filter-group">
            <div class="filter-title">材質工藝</div>
            <div class="filter-buttons" id="group-material">
                <button class="filter-btn" data-filter="不鏽鋼">不鏽鋼</button>
                <button class="filter-btn" data-filter="其他">其他</button>
            </div>
        </div>
    </div>

    <!-- 商品連結清單列表 -->
    <!-- 💡 修改說明：請在 data-tags 裡面填入該商品對應的標籤（用空格隔開） -->
    <div class="items-grid" id="items-container">
        
        <!-- 商品 1 範例 -->
        <a href="這裡放你的團購或購買網址" class="item-card" data-tags="廚房 收納 不鏽鋼">
            <img src="https://via.placeholder.com/150/F2ECE6/5C544E?text=Product" class="item-img" alt="商品照片">
            <div class="item-info">
                <div class="item-name">燕三条 不鏽鋼刀具收納架</div>
                <div class="item-desc">極簡廚房必備，不佔空間的極致金屬工藝。</div>
            </div>
            <div class="item-arrow">→</div>
        </a>

        <!-- 商品 2 範例 -->
        <a href="這裡放你的團購或購買網址" class="item-card" data-tags="廚房 好物 其他">
            <img src="https://via.placeholder.com/150/F2ECE6/5C544E?text=Product" class="item-img" alt="商品照片">
            <div class="item-info">
                <div class="item-name">Marna 站立式透明飯勺</div>
                <div class="item-desc">不黏米粒、優雅站立，讓日常盛飯也變得很療癒。</div>
            </div>
            <div class="item-arrow">→</div>
        </a>

        <!-- 商品 3 範例 -->
        <a href="這裡放你的團購或購買網址" class="item-card" data-tags="浴室 清潔 其他">
            <img src="https://via.placeholder.com/150/F2ECE6/5C544E?text=Product" class="item-img" alt="商品照片">
            <div class="item-info">
                <div class="item-name">Recolte 感應式泡沫洗手機</div>
                <div class="item-desc">奶油色系外觀，極簡感應，生活質感從小細節開始。</div>
            </div>
            <div class="item-arrow">→</div>
        </a>

        <!-- 商品 4 範例 -->
        <a href="這裡放你的團購或購買網址" class="item-card" data-tags="臥室 收納 其他">
            <img src="https://via.placeholder.com/150/F2ECE6/5C544E?text=Product" class="item-img" alt="商品照片">
            <div class="item-info">
                <div class="item-name">日系奶油風 衣物收納盒</div>
                <div class="item-desc">完美隱藏生活雜物，貼合衣櫃空間的極簡選擇。</div>
            </div>
            <div class="item-arrow">→</div>
        </a>

    </div>

    <!-- 當找不到任何符合的商品時顯示 -->
    <div class="no-results" id="no-results-msg">
        沒有找到符合此複合條件的好物，試試看取消部分標籤吧 🤎
    </div>

</div>

<script>
    const buttons = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.item-card');
    const noResultsMsg = document.getElementById('no-results-msg');

    buttons.forEach(button => {
        button.addEventListener('click', () => {
            // 切換當前點擊按鈕的 active 狀態（允許複選或取消）
            button.classList.toggle('active');
            
            // 執行複選篩選核心邏輯
            filterItems();
        });
    });

    function filterItems() {
        // 收集目前所有被選中的標籤文字
        const activeFilters = Array.from(document.querySelectorAll('.filter-btn.active'))
                                   .map(btn => btn.getAttribute('data-filter'));

        let visibleCount = 0;

        items.forEach(item => {
            // 取得該卡片設定的所有標籤（轉成陣列）
            const itemTags = item.getAttribute('data-tags').split(' ');
            
            // 檢查機制：必須「完全包含」所有目前被選中的標籤
            // 也就是說如果同時選了 [廚房, 不鏽鋼]，卡片必須這兩個標籤都有才會顯示
            const isMatch = activeFilters.every(filter => itemTags.includes(filter));

            if (isMatch) {
                item.classList.remove('hidden');
                visibleCount++;
            } else {
                item.classList.add('hidden');
            }
        });

        // 處理沒有任何符合結果的狀況
        if (visibleCount === 0) {
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
        }
    }
</script>

</body>
</html>
