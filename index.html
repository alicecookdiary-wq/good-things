<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾莉絲的食光日記｜好物導航</title>
    <style>
        /* 頂級日系極簡與當代科技微光視覺 */
        :root {
            --bg-color: #FAF8F5;       /* 純淨奶油白 */
            --grid-color: rgba(223, 213, 201, 0.25); /* 浮空網格線條 */
            --card-bg: rgba(255, 255, 255, 0.85);    /* 霧面微透白 */
            --text-main: #4A443F;      /* 沉穩焙茶色 */
            --text-sub: #A39990;       /* 質樸木質灰 */
            --border-color: #EFEAE4;   /* 極細線條 */
            --accent-glow: #C5B4A5;    /* 燕麥微光 */
            --btn-active: #8E7F73;     /* 摩卡深色 */
            --baby-pink-bg: #FFF0EE;   /* 母嬰粉底色 */
            --baby-pink-border: #FCDAD5; /* 母嬰粉邊線 */
            --baby-pink-text: #C57B75;   /* 母嬰粉字體 */
            --baby-pink-active: #E29B96; /* 母嬰粉選中 */
            --shadow-sm: 0 4px 20px rgba(74, 68, 63, 0.02);
            --shadow-md: 0 8px 30px rgba(197, 180, 165, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                radial-gradient(circle at 10% 20%, rgba(242, 236, 230, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 197, 185, 0.3) 0%, transparent 50%);
            background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 0.6px;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            animation: fadeInPage 0.6s ease-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 頂部高級感磨砂玻璃標頭 --- */
        .hero-header {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }
        .hero-header h1 {
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .hero-header p {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 區塊外殼 --- */
        .page-section {
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 24px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .page-section:focus-within, .page-section:hover {
            border-color: var(--accent-glow);
            box-shadow: var(--shadow-md);
        }

        .section-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulseGlow 2s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px var(--accent-glow); }
        }

        .section-title-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }

        /* --- 代碼自動繪製：日系生活感極簡主圖橫幅 --- */
        .hero-banner-illustration {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: linear-gradient(135deg, #F3ECE5 0%, #EAE2D8 100%);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .banner-window {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .banner-shadow-leaves {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(163, 153, 144, 0.08) 0%, transparent 60%);
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .banner-shelf {
            position: absolute;
            width: 100%;
            height: 35px;
            background: #E5DBD0;
            bottom: 0;
            left: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -4px 10px rgba(74, 68, 63, 0.02);
        }
        .banner-bottles-group {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }
        .b-bottle-1 {
            width: 24px;
            height: 65px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 6px 6px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: -2px 4px 10px rgba(74, 68, 63, 0.05);
        }
        .b-bottle-1::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 10px;
            background: #EAE2D8;
            top: -10px;
            left: 5px;
            border-radius: 3px 1px 1px 1px;
        }
        .b-bottle-1::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 50px;
            background: rgba(142, 127, 115, 0.2);
            left: 11px;
            top: 5px;
        }
        .b-bottle-2 {
            width: 32px;
            height: 75px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px 8px 6px 6px;
            position: relative;
            backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 12px rgba(74, 68, 63, 0.06);
        }
        .b-bottle-2::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 8px;
            background: #FFFFFF;
            top: -8px;
            left: 11px;
        }
        .b-bottle-2::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 6px;
            background: #DCD2C7;
            top: -14px;
            left: 7px;
            border-radius: 2px 4px 2px 2px;
        }
        .b-bottle-3 {
            width: 28px;
            height: 52px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 5px 5px 4px 4px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 2px 4px 10px rgba(74, 68, 63, 0.04);
        }
        .b-bottle-3::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 6px;
            background: #C5B4A5;
            top: -6px;
            left: 4px;
            border-radius: 2px 2px 1px 1px;
        }

        /* --- 微縮版開團計畫行事曆專屬手繪美學樣式 --- */
        .calendar-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .calendar-title-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #D3C5B5; /* 溫暖木質沙褐色 */
        }
        .calendar-title-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1.5px;
        }
        .calendar-title-line {
            border: none;
            border-top: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .calendar-section-outer {
            margin-bottom: 16px;
        }
        .calendar-months-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px; /* 緊湊高度 */
        }
        .calendar-nav-tab {
            flex: 1;
            text-align: center;
            font-size: 0.78rem; /* 微縮字體 */
            font-weight: 500;
            color: var(--text-sub);
            padding: 8px 10px; /* 微縮按鈕內距 */
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .calendar-nav-tab.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            box-shadow: 0 4px 12px rgba(142, 127, 115, 0.15);
        }
        .calendar-paper {
            background-color: transparent;
            border: none;
            padding: 0;
            box-shadow: none;
        }
        .calendar-header-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px; /* 縮減間距 */
        }
        .calendar-day-label {
            font-size: 0.78rem; /* 微縮字體 */
            color: var(--text-sub);
            font-weight: 500;
        }
        .calendar-days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 4px; /* 再縮減格子行距 */
            column-gap: 6px;
            text-align: center;
            margin-bottom: 12px;
        }
        .calendar-cell {
            aspect-ratio: 1.6; /* 針對需求高度扁平化，控制行事曆篇幅 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem; /* 微縮字體 */
            font-weight: 500;
            color: var(--text-main);
            position: relative;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .calendar-cell.muted {
            color: #D1C9C0;
        }
        /* 吻合附圖的圓角色塊高亮背景，搭配開團文字顏色，一目了然好辨識 */
        .calendar-cell.hl-neoflam { background-color: #E5DBD0 !important; color: #4A443F !important; font-weight: 600; }
        .calendar-cell.hl-sanko { background-color: #D8E2DC !important; color: #2D4F38 !important; font-weight: 600; }
        .calendar-cell.hl-spacebox { background-color: #FFF0EE !important; color: #C57B75 !important; font-weight: 600; }
        .calendar-cell.hl-yansantiao { background-color: #DCE1E5 !important; color: #2F435A !important; font-weight: 600; }
        .calendar-cell.hl-oxo { background-color: #F5E5D9 !important; color: #834E2B !important; font-weight: 600; }
        .calendar-cell.hl-bonson { background-color: #EAE5F5 !important; color: #5E3D85 !important; font-weight: 600; }

        /* 下方開團排程明細清單 */
        .calendar-divider-dashed {
            border: none;
            border-top: 1px dashed #E2DBD5;
            margin: 20px 0;
        }
        .calendar-event-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 4px;
        }
        .calendar-event-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .calendar-event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .calendar-event-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .calendar-event-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .calendar-event-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .calendar-event-date {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 500;
        }
        .calendar-event-desc {
            font-size: 0.78rem;
            color: var(--text-sub);
            line-height: 1.45;
        }

        /* --- 橫向流暢滑動複選濾鏡 --- */
        .filter-box {
            background: rgba(250, 248, 245, 0.7);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 2px;
        }
        .filter-buttons::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-btn.active {
            background-color: var(--btn-active);
            color: #FFFFFF;
            border-color: var(--btn-active);
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(142, 127, 115, 0.15);
        }

        /* --- 專屬莫蘭迪母嬰粉色按鈕樣式 --- */
        .filter-btn.baby-pink-btn {
            background-color: var(--baby-pink-bg);
            border-color: var(--baby-pink-border);
            color: var(--baby-pink-text);
        }
        .filter-btn.baby-pink-btn.active {
            background-color: var(--baby-pink-active) !important;
            border-color: var(--baby-pink-active) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 10px rgba(226, 155, 150, 0.25) !important;
        }

        /* --- 頂級流暢卡片流 --- */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .item-card {
            background-color: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInItem 0.4s ease-out forwards;
        }
        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item-card:active {
            transform: scale(0.97);
            background-color: rgba(239, 234, 228, 0.7);
            border-color: var(--accent-glow);
        }
        .item-card.hidden { display: none; }
        
        /* 圖片容器：用於承載手帳感的寫實 SVG 線圖 */
        .item-img-container {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background-color: #EFEAE4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .item-img-container svg {
            width: 38px;
            height: 38px;
            display: block;
        }
        .item-info { flex: 1; }
        .item-name-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .item-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        
        /* 產地與特色精緻微勳章 - 僅限育兒用品標示 */
        .origin-badge {
            font-size: 0.625rem;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }
        .origin-tw { background-color: #EBF8F2; color: #1B7A54; border-color: #D3F1E3; }
        .origin-jp { background-color: #FDF2F2; color: #C82F2F; border-color: #FBE2E2; }
        .origin-fr { background-color: #F0F4FF; color: #2B5797; border-color: #E1E8FA; }

        .item-desc { font-size: 0.75rem; color: var(--text-sub); line-height: 1.45; }
        .item-arrow { 
            color: var(--text-sub); 
            font-size: 0.85rem; 
            margin-left: 8px; 
            transition: transform 0.3s ease;
        }
        .item-card:hover .item-arrow {
            transform: translateX(3px);
            color: var(--btn-active);
        }
        
        .status-tag-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .status-tag { 
            font-size: 0.62rem; 
            background-color: #EFEAE4; 
            color: var(--btn-active); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .text-legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .date-tag {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-left: auto;
            font-weight: 500;
        }
        .no-results { text-align: center; padding: 20px 20px; color: var(--text-sub); font-size: 0.8rem; line-height: 1.6; }

        /* --- 預告微型縮小排版樣式 --- */
        #calendar-schedule-details .item-card {
            padding: 10px 14px;
            gap: 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: rgba(250, 248, 245, 0.4);
        }
        #calendar-schedule-details .item-name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        #calendar-schedule-details .item-desc {
            font-size: 0.68rem;
            line-height: 1.35;
            color: var(--text-sub);
            margin-top: 2px;
        }
        #calendar-schedule-details .date-tag {
            font-size: 0.68rem;
        }

        /* --- 心理測驗面板動態優化 --- */
        .quiz-container {
            background-color: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .quiz-question {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.5;
            color: var(--text-main);
            position: relative;
            padding-left: 12px;
        }
        .quiz-question::before {
            content: '';
            position: absolute;
            left: 0;
            top: 3px;
            width: 3px;
            height: 14px;
            background-color: var(--accent-glow);
            border-radius: 2px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .quiz-opt-btn {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            text-align: left;
            line-height: 1.45;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .quiz-opt-btn:active {
            transform: scale(0.98);
            border-color: var(--accent-glow);
            background-color: #FAF8F5;
        }
        
        .quiz-result-box {
            display: none;
            animation: fadeInResult 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
        }
        @keyframes fadeInResult { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .result-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--btn-active);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 1px;
        }
        .result-desc {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 24px;
            line-height: 1.55;
        }
        .quiz-reset-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 0.75rem;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin: 20px auto 0 auto;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        .quiz-reset-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- 頂部高級感標頭 -->
    <div class="hero-header">
        <h1>艾莉絲的食光日記</h1>
        <p>LIVING & SELECTED OBJECT</p>
    </div>

    <!-- 1. 目前開團中區塊 -->
    <div class="page-section">
        <div class="section-title-container">
            <div class="glow-dot"></div>
            <div class="section-title-text">目前開團中</div>

                cell.classList.add(colorInfo.class);

    const filterButtons = document.querySelectorAll('.filter-btn');
    const itemsContainer = document.getElementById('navigation-items');
    const noResultsMsg = document.getElementById('no-results-msg');

    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const isBabyBtn = btn.classList.contains('baby-pink-btn');
            if (isBabyBtn) {
                document.querySelectorAll('.filter-btn:not(.baby-pink-btn)').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.baby-pink-btn').forEach(b => { if (b !== btn) b.classList.remove('active'); });
            } else {
                document.querySelectorAll('.filter-btn.baby-pink-btn').forEach(b => b.classList.remove('active'));
            }
            btn.classList.toggle('active');
            filterItems();
        });
    });

    function filterItems() {
        const activeSpace = Array.from(document.querySelectorAll('.filter-group:nth-child(1) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activePurpose = Array.from(document.querySelectorAll('.filter-group:nth-child(2) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeMaterial = Array.from(document.querySelectorAll('.filter-group:nth-child(3) .filter-btn.active')).map(btn => btn.getAttribute('data-filter'));
        const activeBaby = Array.from(document.querySelectorAll('.baby-pink-btn.active')).map(btn => btn.getAttribute('data-filter'));

        if (!itemsContainer || !noResultsMsg) return;

        if (activeBaby.length > 0) {
            const filteredBaby = allProductsData.filter(prod => {
                if (!prod.isBaby) return false;
                const prodTags = prod.tags.split(' ');
                return activeBaby.some(filter => prodTags.includes(filter));
            });
            renderList(filteredBaby);
            return;
        }

        if (activeSpace.length === 0 || activePurpose.length === 0 || activeMaterial.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "請同時點選「空間」、「用途」與「材質」大類，解鎖私房愛用好物 🤎";
            noResultsMsg.style.display = 'block';
            return;
        }

        const filteredGeneral = allProductsData.filter(prod => {
            if (prod.isBaby) return false;
            const prodTags = prod.tags.split(' ');
            const matchesSpace = activeSpace.some(f => prodTags.includes(f));
            const matchesPurpose = activePurpose.some(f => prodTags.includes(f));
            const matchesMaterial = activeMaterial.some(f => prodTags.includes(f));
            return matchesSpace && matchesPurpose && matchesMaterial;
        });
        renderList(filteredGeneral);
    }

    function renderList(list) {
        if (!itemsContainer || !noResultsMsg) return;

        if (list.length === 0) {
            itemsContainer.innerHTML = '';
            noResultsMsg.innerText = "未找到符合交叉條件的物件";
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
            itemsContainer.innerHTML = '';

            list.forEach(prod => {
                const card = document.createElement('a');
                card.href = prod.url;
                card.target = "_blank";
                card.className = "item-card";

                const badgeHTML = (prod.isBaby && prod.origin) 
                    ? `<span class="origin-badge ${getBadgeClass(prod.origin)}">${prod.origin}</span>` 
                    : '';

                const itemImgHTML = `<div class="item-img-container">${prod.svg}</div>`;

                card.innerHTML = `
                    ${itemImgHTML}
                    <div class="item-info">
                        <div class="item-name-row">
                            <span class="item-name">${prod.name}</span>
                            ${badgeHTML}
                        </div>
                        <div class="item-desc">${prod.desc}</div>
                    </div>
                    <div class="item-arrow">→</div>
                `;
                itemsContainer.appendChild(card);
            });
        }
    }

    function getBadgeClass(origin) {
        if (origin.includes("台灣")) return "origin-tw";
        if (origin.includes("日本")) return "origin-jp";
        if (origin.includes("法國")) return "origin-fr";
        return "";

    let activeQuizQuestions = []; // 存放當次隨機抽出的 3 題

    let scoreArray = [0, 0, 0];

    // 初始化隨機出題演算法 (從 6 題隨機抽取 3 題)
    function initRandomQuestions() {
        let shuffled = [...quizQuestionPool].sort(() => 0.5 - Math.random());
        activeQuizQuestions = shuffled.slice(0, 3);
        // 修正題目前面的數字序號，維持 1、2、3 題的流暢感
        activeQuizQuestions.forEach((item, index) => {
            item.q = (index + 1) + ". " + item.q.substring(3);
        });
    }

    function loadQuestion() {
        const playBox = document.getElementById('quiz-play-box');
        const resultView = document.getElementById('quiz-result-view');
        if (!playBox || !resultView) return;

        playBox.style.display = 'block';
        resultView.style.display = 'none';

        if (currentQIdx < activeQuizQuestions.length) {
            const qText = document.getElementById('quiz-question-text');
            if (qText) qText.innerText = activeQuizQuestions[currentQIdx].q;
            
            const optionsBox = document.getElementById('quiz-options-box');
            if (optionsBox) {
                optionsBox.innerHTML = '';
                activeQuizQuestions[currentQIdx].opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-opt-btn';
                    btn.innerText = opt;
                    btn.onclick = function() {
                        scoreArray[idx]++;
                        currentQIdx++;
                        loadQuestion();
                    };
                    optionsBox.appendChild(btn);
                });
            }
        } else {
            showQuizResult();
        }
    }

    function showQuizResult() {
        const playBox = document.getElementById('quiz-play-box');
        const resultView = document.getElementById('quiz-result-view');
        if (!playBox || !resultView) return;

        playBox.style.display = 'none';
        resultView.style.display = 'block';

        let maxIdx = scoreArray.indexOf(Math.max(...scoreArray));
        if (maxIdx === -1) maxIdx = 0;
        const finalResult = resultPools[maxIdx];

        const rTitle = document.getElementById('res-title');
        const rDesc = document.getElementById('res-desc');
        if (rTitle) rTitle.innerText = finalResult.title;
        if (rDesc) rDesc.innerText = finalResult.desc;

        const randomProduct = recommendPool[Math.floor(Math.random() * recommendPool.length)];
        const placement = document.getElementById('random-product-placement');
